// ─── Geometry helpers ─────────────────────────────────────────────────────────
const glueTW  = W => Math.max(28, Math.round(W * 0.12));
const clamp   = (v,a,b) => Math.max(a, Math.min(b, v));
const round1  = v => Math.round(v * 10) / 10;
const uniqKey = v => JSON.stringify(v);

function calcSlotted(L,W,H,flaps){
  const{tMj=0,tMn=0,bMj=0,bMn=0}=flaps;
  const g=glueTW(W);
  const topH=tMj>0?Math.max(tMj,tMn):0;
  const btmH=bMj>0?Math.max(bMj,bMn):0;
  return{g,topH,btmH,blankW:g+2*W+2*L,blankH:H+topH+btmH,tMj,tMn,bMj,bMn,
    xs:[0,g,g+W,g+W+L,g+W+L+W,g+2*W+2*L]};
}
function calcTray(L,W,H){return{blankW:L+2*H,blankH:W+2*H};}

let _eid=0;
const eid=()=>(++_eid).toString(16).toUpperCase().padStart(4,"0");
const mkLine=(ly,x1,y1,x2,y2)=>

function assembleDXF(cuts,creases){
  _eid=0;
  const hdr=`  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1015\n  9\n$INSUNITS\n 70\n4\n  0\nENDSEC`;
  const tbl=`  0\nSECTION\n  2\nTABLES\n  0\nTABLE\n  2\nLAYER\n 70\n2\n  0\nLAYER\n  2\nCUT\n 70\n0\n 62\n1\n  6\nCONTINUOUS\n  0\nLAYER\n  2\nCREASE\n 70\n0\n 62\n5\n  6\nDASHED\n  0\nENDTAB\n  0\nENDSEC`;
  const ents=[...cuts.map(([a,b,c,d])=>mkLine("CUT",a,b,c,d)),...creases.map(([a,b,c,d])=>mkLine("CREASE",a,b,c,d))].join("\n");
  return`${hdr}\n${tbl}\n  0\nSECTION\n  2\nENTITIES\n${ents}\n  0\nENDSEC\n  0\nEOF`;
}

function genDXFSlotted(L,W,H,geo,extraCuts=[],extraCreases=[]){
  const{g,topH,btmH,tMn,bMn,xs}=geo;
  const[x0,x1,x2,x3,x4,x5]=xs;
  const y0=0,y1=btmH,y2=btmH+H,y3=btmH+H+topH;
  const cuts=[],cr=[];
  cuts.push([x0,y0,x5,y0],[x5,y0,x5,y3],[x5,y3,x0,y3],[x0,y3,x0,y0]);
  cuts.push([x1,y1,x1,y2]);
  if(btmH>0)[x1,x2,x3,x4].forEach(x=>cuts.push([x,y0,x,y1]));
  if(topH>0)[x1,x2,x3,x4].forEach(x=>cuts.push([x,y2,x,y3]));
  if(btmH>0&&bMn<btmH){cuts.push([x1,bMn,x2,bMn]);cuts.push([x3,bMn,x4,bMn]);}
  if(topH>0&&tMn<topH){const ty=y2+tMn;cuts.push([x1,ty,x2,ty]);cuts.push([x3,ty,x4,ty]);}
  [x2,x3,x4].forEach(x=>cr.push([x,y1,x,y2]));
  if(btmH>0)cr.push([x1,y1,x5,y1]);
  if(topH>0)cr.push([x1,y2,x5,y2]);
  return assembleDXF(cuts.concat(extraCuts),cr.concat(extraCreases));
}
function genDXFTray(L,W,H){
  const x0=0,x1=H,x2=H+L,x3=H+L+H,y0=0,y1=H,y2=H+W,y3=H+W+H;
  const cuts=[[x1,y0,x2,y0],[x2,y0,x2,y1],[x2,y1,x3,y1],[x3,y1,x3,y2],[x3,y2,x2,y2],[x2,y2,x2,y3],[x2,y3,x1,y3],[x1,y3,x1,y2],[x1,y2,x0,y2],[x0,y2,x0,y1],[x0,y1,x1,y1],[x1,y1,x1,y0]];
  const cr=[[x1,y1,x2,y1],[x1,y2,x2,y2],[x1,y1,x1,y2],[x2,y1,x2,y2]];
  return assembleDXF(cuts,cr);
}

// ─── In-context design geometry ingest (phase 1) ─────────────────────────────
const CAD_LIBS={
  OBJ:"https://unpkg.com/three@0.159.0/examples/js/loaders/OBJLoader.js",
  STL:"https://unpkg.com/three@0.159.0/examples/js/loaders/STLLoader.js",
  GLTF:"https://unpkg.com/three@0.159.0/examples/js/loaders/GLTFLoader.js",
  CONVEX:"https://unpkg.com/three@0.159.0/examples/js/math/ConvexHull.js",
};
let _ocModulePromise=null;

function loadExternalScript(src){
  return new Promise((resolve,reject)=>{
    const existing=[...document.querySelectorAll("script")].find(s=>s.src===src);
    if(existing){resolve();return;}
    const s=document.createElement("script");
    s.src=src;s.async=true;
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error(`Failed to load script: ${src}`));
    document.head.appendChild(s);
  });
}

async function ensureCadLoaders(kind){
  const needs={obj:CAD_LIBS.OBJ,stl:CAD_LIBS.STL,gltf:CAD_LIBS.GLTF};
  const ctorMap={obj:"OBJLoader",stl:"STLLoader",gltf:"GLTFLoader"};
  if(kind==="hull"&&!THREE.ConvexHull)await loadExternalScript(CAD_LIBS.CONVEX);
  if(needs[kind]&&!THREE[ctorMap[kind]])await loadExternalScript(needs[kind]);
}

async function ensureOpenCascade(){
  if(_ocModulePromise)return _ocModulePromise;
  // In this browser-standalone build we lazy-import oc.js from CDN.
  _ocModulePromise=import("https://cdn.jsdelivr.net/npm/opencascade.js@2.0.0/dist/index.js")
    .then(m=>m.default?m.default():m)
    .catch(err=>{_ocModulePromise=null;throw err;});
  return _ocModulePromise;
}

function meshBounds(mesh){
  const box=new THREE.Box3().setFromObject(mesh);
  const size=box.getSize(new THREE.Vector3());
  return{L:size.x,H:size.y,W:size.z,box};
}

function worldVerticesFromMesh(mesh){
  const out=[];
  mesh.updateWorldMatrix(true,true);
  mesh.traverse(obj=>{
    if(!obj.isMesh||!obj.geometry?.attributes?.position)return;
    const pos=obj.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      const v=new THREE.Vector3().fromBufferAttribute(pos,i).applyMatrix4(obj.matrixWorld);
      out.push(v);
    }
  });
  return out;
}

async function computeConvexHullForMesh(mesh){
  await ensureCadLoaders("hull");
  if(!THREE.ConvexHull)return null;
  const pts=worldVerticesFromMesh(mesh);
  if(pts.length<4)return null;
  const hull=new THREE.ConvexHull().setFromPoints(pts);
  return{hull,pointCount:pts.length};
}

async function loadMeshFromCadFile(file){
  const ext=(file?.name?.split(".").pop()||"").toLowerCase();
  if(!file)throw new Error("No file provided");
  const readText=()=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||""));r.onerror=()=>rej(r.error||new Error("Read failed"));r.readAsText(file);});
  const readArrayBuffer=()=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error||new Error("Read failed"));r.readAsArrayBuffer(file);});
  if(ext==="obj"){
    await ensureCadLoaders("obj");
    const txt=await readText();
    const obj=new THREE.OBJLoader().parse(txt);
    const g=new THREE.Group();g.add(obj);
    return{kind:"obj",root:g};
  }
  if(ext==="stl"){
    const buf=await readArrayBuffer();
    const geom=parseSTLBuffer(buf);
    const mat=new THREE.MeshStandardMaterial({color:0x9CA3AF,roughness:0.6,metalness:0.1});
    const mesh=new THREE.Mesh(geom,mat);
    const g=new THREE.Group();g.add(mesh);
    return{kind:"stl",root:g};
  }
  if(ext==="gltf"||ext==="glb"){
    await ensureCadLoaders("gltf");
    const loader=new THREE.GLTFLoader();
    const url=URL.createObjectURL(file);
    try{
      const gltf=await new Promise((res,rej)=>loader.load(url,res,undefined,rej));
      const g=new THREE.Group();g.add(gltf.scene);
      return{kind:ext,root:g,raw:gltf};
    }finally{
      URL.revokeObjectURL(url);
    }
  }
  if(ext==="step"||ext==="stp"){
    // STEP parsing requires OCCT triangulation. Hook up in phase 2 UI flow.
    const oc=await ensureOpenCascade();
    return{kind:"step",root:null,oc,note:"STEP runtime loaded; mesh triangulation wiring next."};
  }
  throw new Error(`Unsupported CAD format: .${ext}`);
}

function parseSTLBuffer(buffer){
  const bytes=new Uint8Array(buffer);
  const header=(new TextDecoder().decode(bytes.slice(0,80))||"").trim().toLowerCase();
  const faceCount=new DataView(buffer).getUint32(80,true);
  const expectedSize=84+(faceCount*50);
  const isBinary=expectedSize===bytes.length;
  if(isBinary)return parseBinarySTL(buffer);
  if(header.startsWith("solid"))return parseAsciiSTL(new TextDecoder().decode(bytes));
  // fallback: try binary first, then ascii
  try{return parseBinarySTL(buffer);}catch{return parseAsciiSTL(new TextDecoder().decode(bytes));}
}
function parseBinarySTL(buffer){
  const dv=new DataView(buffer);
  const faces=dv.getUint32(80,true);
  const verts=new Float32Array(faces*9);
  let off=84,vi=0;
  for(let i=0;i<faces;i++){
    off+=12; // normal
    for(let v=0;v<3;v++){
      verts[vi++]=dv.getFloat32(off,true);off+=4;
      verts[vi++]=dv.getFloat32(off,true);off+=4;
      verts[vi++]=dv.getFloat32(off,true);off+=4;
    }
    off+=2; // attr byte count
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.BufferAttribute(verts,3));
  g.computeVertexNormals();
  return g;
}
function parseAsciiSTL(text){
  const nums=[...text.matchAll(/vertex\s+([-\d.eE+]+)\s+([-\d.eE+]+)\s+([-\d.eE+]+)/g)];
  if(!nums.length)throw new Error("Could not parse STL");
  const verts=new Float32Array(nums.length*3);
  let i=0;
  for(const m of nums){
    verts[i++]=Number(m[1]);verts[i++]=Number(m[2]);verts[i++]=Number(m[3]);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.BufferAttribute(verts,3));
  g.computeVertexNormals();
  return g;
}

// ─── Packing algorithms (from HookePakIntegratedApp) ─────────────────────────
function orientationsForProduct(product){
  if(product.type==="box"){
    const dims=[product.L,product.W,product.H];
    const perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]].map(([a,b,c])=>[dims[a],dims[b],dims[c]]);
    const seen=new Set();
    return perms.filter(p=>{const k=uniqKey(p);if(seen.has(k))return false;seen.add(k);return true;})
      .map(([L,W,H])=>({kind:"box",L,W,H,label:`${L}x${W}x${H}`}));
  }
  if(product.type==="cylinder"){
    const{diameter:d,H}=product;
    return[
      {kind:"cylinder-upright",footprintL:d,footprintW:d,H,diameter:d,label:`upright dia${d}`},
      {kind:"cylinder-side",footprintL:H,footprintW:d,H:d,diameter:d,length:H,label:`side ${H}xdia${d}`},
    ];
  }
  return[];
}
function productUnitVolume(product,orient){
  if(product.type==="box")return orient.L*orient.W*orient.H;
  const r=product.diameter/2;return Math.PI*r*r*product.H;
}
function generateGridPattern(box,product,orient){
  const gap=product.gap??0;
  const cellL=(product.type==="box"?orient.L:orient.footprintL)+gap;
  const cellW=(product.type==="box"?orient.W:orient.footprintW)+gap;
  const cellH=(product.type==="box"?orient.H:orient.H)+gap;
  const nx=Math.max(0,Math.floor((box.L+gap)/cellL));
  const ny=Math.max(0,Math.floor((box.W+gap)/cellW));
  const nz=Math.max(0,Math.floor((box.H+gap)/cellH));
  const usedL=nx>0?nx*cellL-gap:0,usedW=ny>0?ny*cellW-gap:0;
  const originX=-usedL/2,originZ=-usedW/2,originY=-box.H/2+(cellH-gap)/2;
  const placements=[];
  for(let k=0;k<nz;k++)for(let j=0;j<ny;j++)for(let i=0;i<nx;i++)
    placements.push({x:originX+i*cellL+(cellL-gap)/2,y:originY+k*cellH,z:originZ+j*cellW+(cellW-gap)/2,orientation:orient});
  return{id:`grid-${orient.label}`,name:`Grid · ${orient.label}`,strategy:"grid",count:placements.length,nx,ny,nz,placements};
}
function generateBrickPattern(box,product,orient){
  if(product.type!=="box")return null;
  const gap=product.gap??0;
  const{L:pL,W:pW,H:pH}=orient;
  const cellH=pH+gap,nz=Math.max(0,Math.floor((box.H+gap)/cellH));
  const placements=[];
  for(let layer=0;layer<nz;layer++){
    const offset=layer%2===0?0:(pL+gap)/2;
    const nx=Math.max(0,Math.floor((box.L-offset+gap)/(pL+gap)));
    const ny=Math.max(0,Math.floor((box.W+gap)/(pW+gap)));
    const usedL=nx>0?nx*(pL+gap)-gap:0,usedW=ny>0?ny*(pW+gap)-gap:0;
    const startX=-usedL/2+offset,startZ=-usedW/2;
    const y=-box.H/2+pH/2+layer*cellH;
    for(let j=0;j<ny;j++)for(let i=0;i<nx;i++){
      const x=startX+i*(pL+gap);
      if(x+pL/2>box.L/2||x-pL/2<-box.L/2)continue;
      placements.push({x,y,z:startZ+j*(pW+gap)+pW/2,orientation:orient});
    }
  }
  return{id:`brick-${orient.label}`,name:`Brick · ${orient.label}`,strategy:"brick",count:placements.length,placements};
}
function enrichFill(pattern,box,product){
  if(!pattern||pattern.count<=0)return null;
  const boxVol=box.L*box.W*box.H;
  const firstOrient=pattern.placements[0]?.orientation;
  const unitVol=firstOrient?productUnitVolume(product,firstOrient):0;
  const utilisation=boxVol>0?(unitVol*pattern.count)/boxVol:0;
  return{...pattern,utilisation};
}
function buildFillPatterns(box,product){
  const out=[];
  orientationsForProduct(product).forEach(orient=>{
    const g=generateGridPattern(box,product,orient);if(g?.count>0)out.push(enrichFill(g,box,product));
    const b=generateBrickPattern(box,product,orient);if(b?.count>0)out.push(enrichFill(b,box,product));
  });
  return out.filter(Boolean).sort((a,b)=>b.count!==a.count?b.count-a.count:(b.utilisation||0)-(a.utilisation||0));
}

// ─── Pallet placement engine ───────────────────────────────────────────────
// Each pattern returns layerTemplates: array of layer configs.
// Pallet3D uses layerTemplates[k % layerTemplates.length] for layer k.
// Each placement: { x, z, rotated } — x/z in mm from pallet centre.

function mkLayerPlacements(pallet, carton, rotated, gap){
  const cL=rotated?carton.W:carton.L, cW=rotated?carton.L:carton.W;
  const nx=Math.max(0,Math.floor(pallet.L/cL));
  const ny=Math.max(0,Math.floor(pallet.W/cW));
  // Center the tight grid on the pallet so leftover slack is split left/right
  // (corner-anchored packing leaves one-sided gaps when nx*cL < pallet.L).
  const usedL=nx>0?nx*(cL+gap)-gap:0;
  const usedW=ny>0?ny*(cW+gap)-gap:0;
  const startX=-usedL/2+cL/2;
  const startZ=-usedW/2+cW/2;
  const placements=[];
  for(let j=0;j<ny;j++) for(let i=0;i<nx;i++)
    placements.push({x:startX+i*(cL+gap), z:startZ+j*(cW+gap), rotated});
  return{placements, nx, ny, count:nx*ny};
}

function mkPinwheelLayer(pallet, carton, gap){
  const quad=(x0,x1,z0,z1,rotated)=>{
    const cL=rotated?carton.W:carton.L;
    const cW=rotated?carton.L:carton.W;
    const Wreg=x1-x0,Zreg=z1-z0;
    const nx=Math.max(0,Math.floor(Wreg/cL));
    const nz=Math.max(0,Math.floor(Zreg/cW));
    const usedX=nx>0?nx*(cL+gap)-gap:0;
    const usedZ=nz>0?nz*(cW+gap)-gap:0;
    const marginX=nx>0?(Wreg-usedX)/2:0;
    const marginZ=nz>0?(Zreg-usedZ)/2:0;
    const startX=x0+marginX+cL/2;
    const startZ=z0+marginZ+cW/2;
    const out=[];
    for(let j=0;j<nz;j++)for(let i=0;i<nx;i++){
      const x=startX+i*(cL+gap);
      const z=startZ+j*(cW+gap);
      out.push({x,z,rotated});
    }
    return out;
  };
  const halfL=pallet.L/2, halfW=pallet.W/2;
  const placements=[
    ...quad(-halfL,0,-halfW,0,false), // top-left normal
    ...quad(0,halfL,-halfW,0,true),   // top-right rotated
    ...quad(0,halfL,0,halfW,false),   // bottom-right normal
    ...quad(-halfL,0,0,halfW,true),   // bottom-left rotated
  ].filter(p=>{
    const bL=p.rotated?carton.W:carton.L;
    const bW=p.rotated?carton.L:carton.W;
    return Math.abs(p.x)+bL/2<=halfL+1e-6 && Math.abs(p.z)+bW/2<=halfW+1e-6;
  });
  const nx=Math.max(0,Math.floor(pallet.L/carton.L));
  const ny=Math.max(0,Math.floor(pallet.W/carton.W));
  return{placements,nx,ny,count:placements.length};
}

function chooseBestColumnLayer(pallet,carton,gap){
  const normal=mkLayerPlacements(pallet,carton,false,gap);
  const rotated=mkLayerPlacements(pallet,carton,true,gap);
  if(normal.count>=rotated.count)return normal;
  return rotated;
}

function compressionLabel(strategy){
  if(strategy==="column")return"High (column stacking)";
  if(strategy==="interlocked")return"Medium-High (interlocked)";
  return"Medium (pinwheel)";
}

function patternHasMixedOrientations(pattern){
  const set=new Set();
  (pattern?.layerTemplates||[]).forEach(t=>(t.placements||[]).forEach(p=>set.add(p.rotated?"r":"n")));
  return set.size>1 || pattern?.strategy==="interlocked";
}

function buildPalletPatterns(pallet,carton,gap=0){
  if(!carton.H||carton.H<=0)return[];
  const DECK_H=144;
  const availH=Math.max(0,pallet.maxH-DECK_H);
  const maxLayers=Math.max(0,Math.floor(availH/carton.H));
  const palletVol=pallet.L*pallet.W*availH;
  const cartonVol=carton.L*carton.W*carton.H;

  const layerNormal=mkLayerPlacements(pallet,carton,false,gap);
  const layerRotated=mkLayerPlacements(pallet,carton,true,gap);
  const layerColumn=chooseBestColumnLayer(pallet,carton,gap);
  const layerPinwheel=mkPinwheelLayer(pallet,carton,gap);
  const interLayerCount=Math.round((layerNormal.count+layerRotated.count)/2);

  const patterns=[
    {
      id:"column",
      name:"Column/Block",
      description:"Highest compression strength. Corners stack on corners.",
      strategy:"column",
      layerTemplates:[layerColumn],
      layerCount:layerColumn.count,
      nx:layerColumn.nx,
      ny:layerColumn.ny,
    },
    {
      id:"interlocked",
      name:"Interlocked/Brick",
      description:"Alternating 90° rotation each layer. Highest stability for transit.",
      strategy:"interlocked",
      layerTemplates:[layerNormal,layerRotated],
      layerCount:interLayerCount,
      nx:Math.max(layerNormal.nx,layerRotated.nx),
      ny:Math.max(layerNormal.ny,layerRotated.ny),
    },
    {
      id:"pinwheel",
      name:"Pinwheel",
      description:"Rotational arrangement per layer. Best for stability with mixed loads.",
      strategy:"pinwheel",
      layerTemplates:[layerPinwheel],
      layerCount:layerPinwheel.count,
      nx:layerPinwheel.nx,
      ny:layerPinwheel.ny,
    },
  ];

  return patterns.map(p=>{
    const totalCartons=p.layerCount*maxLayers;
    const utilisation=palletVol>0?(totalCartons*cartonVol)/palletVol:0;
    return{...p,maxLayers,totalCartons,utilisation,availH};
  }).sort((a,b)=>b.totalCartons!==a.totalCartons?b.totalCartons-a.totalCartons:(b.utilisation||0)-(a.utilisation||0));
}

// ─── Box3D 3D engine (hinge-chain, kraft appearance) ───────────────────────────
const SC    = 0.005;
const PIH   = Math.PI / 2;
const ease  = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const lrp   = (a, b, t) => a + (b - a) * t;

// ─── ArtiosCAD-style kraft colours ───────────────────────────────────────────
const K = {
  outerFace : 0xCC9F58,
  sideWall  : 0xC49348,
  innerFlap : 0xBB8C44,
  minorFlap : 0xB08640,
  glueTab   : 0xA87C36,
  base      : 0xC89850,
  lidWall   : 0xB89048,
};

function mkMat(col) {
  return new THREE.MeshStandardMaterial({ color:col, roughness:0.90, metalness:0, side:THREE.DoubleSide });
}
function mkMesh(wMm, hMm, dMm, col) {
  return new THREE.Mesh(new THREE.BoxGeometry(wMm*SC, hMm*SC, dMm*SC), mkMat(col));
}

// ─── Clear group ──────────────────────────────────────────────────────────────
function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    c.traverse?.(n=>{
      if (n.geometry) n.geometry.dispose();
      if (n.material) (Array.isArray(n.material)?n.material:[n.material]).forEach(m=>m.dispose?.());
    });
    g.remove(c);
  }
}

function applyUnit(bbox, unit){
  if(!bbox)return null;
  const factors={mm:1,cm:10,inches:25.4,m:1000};
  const f=factors[unit]||1;
  return{
    L:Math.round(bbox.L*f*10)/10,
    W:Math.round(bbox.W*f*10)/10,
    H:Math.round(bbox.H*f*10)/10,
  };
}
function mapBoardName(rec=""){
  const t=String(rec).toLowerCase();
  if(t.includes("bc"))return "BC double";
  if(t.includes("c-flute")||t.includes(" c "))return "C-flute";
  if(t.includes("e-flute")||t.includes(" e "))return "E-flute";
  if(t.includes("solid"))return "Solid board";
  return "B-flute";
}
async function parseProductFile(file){
  const ext=(file?.name?.split(".").pop()||"").toLowerCase();
  let geometry=null;
  if(ext==="stl"){
    geometry=parseSTLBuffer(await file.arrayBuffer());
  }else if(ext==="obj"||ext==="glb"||ext==="gltf"){
    const loaded=await loadMeshFromCadFile(file);
    loaded?.root?.traverse(child=>{if(child.isMesh&&!geometry)geometry=child.geometry;});
  }else{
    throw new Error("Unsupported format");
  }
  if(!geometry)throw new Error("Could not extract mesh geometry");
  geometry.computeBoundingBox();
  const bbox=geometry.boundingBox;
  const size=new THREE.Vector3();bbox.getSize(size);
  const rawL=size.x,rawH=size.y,rawW=size.z;
  const maxDim=Math.max(rawL,rawH,rawW);
  let detectedUnit="mm";
  if(maxDim<0.1)detectedUnit="m";
  else if(maxDim<2.5)detectedUnit="inches";
  else if(maxDim<25)detectedUnit="cm";
  else detectedUnit="mm";
  return{geometry,mesh:new THREE.Mesh(geometry),bbox:{L:rawL,W:rawW,H:rawH},detectedUnit};
}
async function inferPackagingFromProduct(bbox, filename, clearance){
  const c=typeof clearance==="number"

    :clearance;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,
      system:"You are an expert packaging engineer. Given a product bounding box and filename, suggest the optimal corrugated shipping carton configuration. Return ONLY valid JSON, no other text.",
      messages:[{role:"user",content:`Product file: ${filename}
Bounding box: L=${bbox.L}mm W=${bbox.W}mm H=${bbox.H}mm
Clearance by face (mm): top=${c.top} bottom=${c.bottom} left=${c.left} right=${c.right} front=${c.front} back=${c.back}

Return JSON:
{
  productGuess: string,
  confidence: 'high'|'medium'|'low',
  fefcoStyle: string,

  innerL: number,
  innerW: number,

}

innerL = bbox.L + left + right, innerW = bbox.W + front + back, innerH = bbox.H + top + bottom.
Round to nearest 5mm.

// ─── Flap config per FEFCO style ─────────────────────────────────────────────
function getFlapCfg(style, W) {
  const h = W / 2;
  switch (style) {
    case "0202": { const ov=Math.max(10,W*0.08); return {tMj:h+ov,tMn:W*0.25,bMj:h+ov,bMn:W*0.25,open:false,cap:1}; }
    case "0203": return {tMj:h,tMn:W/3,bMj:h,bMn:W/3,open:false,cap:1};
    case "0204": return {tMj:0,tMn:0,bMj:h,bMn:h,open:true,cap:1};
    case "0206": return {tMj:W/4,tMn:W/4,bMj:W/4,bMn:W/4,open:false,cap:1};
    case "0215": return {tMj:W,tMn:h,bMj:W,bMn:h,open:false,cap:1};
    case "0301": return {tMj:0,tMn:0,bMj:h,bMn:h,open:true,cap:1};
    default:     return {tMj:h,tMn:h,bMj:h,bMn:h,open:false,cap:1};
  }
}

// ─── SLOTTED FAMILY ───────────────────────────────────────────────────────────
//
// Hinge-chain architecture — panels are children of the previous panel's edge group
// so they physically rotate around their crease lines:
//
//  cartonGroup
//  └── frontGroup  (FIXED at z=-W/2 throughout animation)
//      ├── frontMesh
//      ├── fbHinge  (front-bottom, rotates X: 0→-PIH)
//      ├── ftHinge  (front-top,    rotates X: 0→+PIH)
//      └── leftHinge (at x=-L/2,  rotates Y: 0→+PIH) ← panel unfolds leftward in flat state
//          ├── side1Mesh (at local x=-W/2)
//          ├── s1bHinge, s1tHinge
//          └── backHinge (at local x=-W, rotates Y: 0→+PIH)
//              ├── backMesh (at local x=-L/2)
//              ├── bkbHinge, bktHinge
//              └── rightHinge (at local x=-L, rotates Y: 0→+PIH)
//                  ├── side2Mesh (at local x=-W/2)
//                  ├── s2bHinge, s2tHinge
//                  └── glueHinge (at local x=-W, rotates Y: 0→PIH*1.04)
//                      └── glueMesh (at local x=-g/2)
//
// At t=0 (flat): all Y-hinges=0 → all panels coplanar in the z=-W/2 plane,
//   spreading leftward: glue–side2–back–side1–FRONT.
// At t=1 (erected): all Y-hinges=PIH → rectangular tube.
// Flap X-hinges: bottom 0→-PIH, top 0→+PIH, minor flaps capped at `cap` fraction.
//
function buildSlotted(L, W, H, style, bT, group) {
  const { tMj, tMn, bMj, bMn, open, cap } = getFlapCfg(style, W);
  const g = Math.max(28, Math.round(W * 0.12));

  // Add flap hinge + mesh attached to `parent`
  // lx, ly = hinge position in parent local frame (mm)
  // moff   = mesh Y-centre offset from hinge (mm)
  // fw, fh = flap face dimensions (mm)
  const mkFlap = (parent, lx, ly, moff, fw, fh, col) => {
    if (fh <= 0) return null;
    const hinge = new THREE.Group();
    hinge.position.set(lx*SC, ly*SC, 0);
    parent.add(hinge);
    const mesh = mkMesh(fw, fh, bT, col);
    mesh.position.y = moff * SC;
    hinge.add(mesh);
    return hinge;
  };

  // ── Front panel (fixed reference at z = -W/2) ────────────────────────────
  const fg = new THREE.Group();
  fg.position.z = -W/2 * SC;
  group.add(fg);
  fg.add(mkMesh(L, H, bT, K.outerFace));

  const fbH = mkFlap(fg, 0, -H/2, -bMj/2, L, bMj, K.innerFlap);   // front bottom major
  const ftH = open ? null : mkFlap(fg, 0, H/2, tMj/2, L, tMj, K.innerFlap); // front top major

  // ── Left hinge (at front panel's left crease x=-L/2) ────────────────────
  const lH = new THREE.Group(); lH.position.x = -L/2*SC; fg.add(lH);
  const s1 = mkMesh(W, H, bT, K.sideWall); s1.position.x = -W/2*SC; lH.add(s1);
  const s1bH = mkFlap(lH, -W/2, -H/2, -bMn/2, W, bMn, K.minorFlap);
  const s1tH = open ? null : mkFlap(lH, -W/2, H/2, tMn/2, W, tMn, K.minorFlap);

  // ── Back hinge (at left panel's far crease x=-W inside leftHinge) ────────
  const bkH = new THREE.Group(); bkH.position.x = -W*SC; lH.add(bkH);
  const bk = mkMesh(L, H, bT, K.outerFace); bk.position.x = -L/2*SC; bkH.add(bk);
  const bkbH = mkFlap(bkH, -L/2, -H/2, -bMj/2, L, bMj, K.innerFlap);
  const bktH = open ? null : mkFlap(bkH, -L/2, H/2, tMj/2, L, tMj, K.innerFlap);

  // ── Right hinge (at back panel's far crease x=-L inside backHinge) ───────
  const rH = new THREE.Group(); rH.position.x = -L*SC; bkH.add(rH);
  const s2 = mkMesh(W, H, bT, K.sideWall); s2.position.x = -W/2*SC; rH.add(s2);
  const s2bH = mkFlap(rH, -W/2, -H/2, -bMn/2, W, bMn, K.minorFlap);
  const s2tH = open ? null : mkFlap(rH, -W/2, H/2, tMn/2, W, tMn, K.minorFlap);

  // ── Glue hinge ────────────────────────────────────────────────────────────
  const gH = new THREE.Group(); gH.position.x = -W*SC; rH.add(gH);
  const gt = mkMesh(g, H, bT, K.glueTab); gt.position.x = -g/2*SC; gH.add(gt);

  // ── Animate(t) ────────────────────────────────────────────────────────────
  return (t) => {
    // Body: all four Y-hinges 0→PIH (t 0→0.52)
    const bdy = ease(clamp(t / 0.52, 0, 1)) * PIH;
    lH.rotation.y = bdy;  bkH.rotation.y = bdy;
    rH.rotation.y = bdy;  gH.rotation.y  = bdy * 1.04;

    // Bottom minor flaps (fold in FIRST, fully closed before major begins)
    const bmn = -ease(clamp((t-0.20)/0.32,0,1)) * PIH * cap;
    if (s1bH) s1bH.rotation.x = bmn;
    if (s2bH) s2bH.rotation.x = bmn;

    // Bottom major flaps (start only after minors are mostly in)
    const bmj = -ease(clamp((t-0.42)/0.28,0,1)) * PIH * 0.98;
    if (fbH)  fbH.rotation.x  = bmj;
    if (bkbH) bkbH.rotation.x = bmj;
    // Overlap styles: stack second major flap by bT so it sits ON TOP of first
    if (bkbH && bMj > W/2) bkbH.position.z = ease(clamp((t-0.32)/0.36,0,1)) * bT * SC;

    // Top minor flaps (fold in FIRST)
    const tmn = ease(clamp((t-0.56)/0.26,0,1)) * PIH * cap;
    if (s1tH) s1tH.rotation.x = tmn;
    if (s2tH) s2tH.rotation.x = tmn;

    // Top major flaps (start only after top minors are mostly in)
    const tmj = ease(clamp((t-0.72)/0.28,0,1)) * PIH * 0.98;
    if (ftH)  ftH.rotation.x  = tmj;
    if (bktH) bktH.rotation.x = tmj;
    if (bktH && tMj > W/2) bktH.position.z = -ease(clamp((t-0.65)/0.35,0,1)) * bT * SC;
  };
}

// ─── TRAY (0300) ──────────────────────────────────────────────────────────────
// Base is the fixed reference (lying flat). Four walls hinge from the base edges.
//
//  cartonGroup
//  └── baseGroup  (at y=-H/2)
//      ├── baseMesh  (lying flat, rotation.x=PIH)
//      ├── fwH  (front-wall hinge at z=+W/2, rotates X: +PIH→0)
//      ├── bwH  (back-wall  hinge at z=-W/2, rotates X: -PIH→0)
//      ├── lwH  (left-wall  hinge at x=-L/2, rotates Z: +PIH→0)
//      └── rwH  (right-wall hinge at x=+L/2, rotates Z: -PIH→0)
//
function buildTray(L, W, H, bT, group) {
  const bg = new THREE.Group();
  bg.position.y = -H/2 * SC;
  group.add(bg);

  // Base lying flat
  const bm = mkMesh(L, W, bT, K.base); bm.rotation.x = PIH; bg.add(bm);

  // Front/back walls: BoxGeometry(L,H,bT), hinge on base edge, mesh extends upward
  const mkLWall = (lz, xrot_flat) => {
    const h = new THREE.Group(); h.position.set(0, 0, lz*SC); bg.add(h);
    h.rotation.x = xrot_flat;
    const m = mkMesh(L, H, bT, K.sideWall); m.position.y = H/2*SC; h.add(m);
    return h;
  };
  const fwH = mkLWall( W/2,  PIH);
  const bwH = mkLWall(-W/2, -PIH);

  // Left/right walls: BoxGeometry(bT,H,W) — bT along X (thin), H along Y, W along Z
  // hinge on base x-edge, mesh extends upward, rotates around Z axis
  const mkSWall = (lx, zrot_flat) => {
    const h = new THREE.Group(); h.position.set(lx*SC, 0, 0); bg.add(h);
    h.rotation.z = zrot_flat;
    const m = mkMesh(bT, H, W, K.sideWall);
    m.position.set(Math.sign(lx)*bT/2*SC, H/2*SC, 0);
    h.add(m);
    return h;
  };
  const lwH = mkSWall(-L/2,  PIH);
  const rwH = mkSWall( L/2, -PIH);

  return (t) => {
    const wT = ease(clamp(t / 0.68, 0, 1));
    fwH.rotation.x =  PIH * (1 - wT);
    bwH.rotation.x = -PIH * (1 - wT);
    lwH.rotation.z =  PIH * (1 - wT);
    rwH.rotation.z = -PIH * (1 - wT);
  };
}

// ─── TELESCOPE (0713) ─────────────────────────────────────────────────────────
// Base box (0204 open-top) assembled first. Lid assembled alongside (offset right
// in flat state). In erected state lid rises to sit above the base.
function buildTelescope(L, W, H, lidH, bT, group) {
  const g  = Math.max(28, Math.round(W * 0.12));
  const BW = g + 2*W + 2*L;        // one blank width
  const gap = L * 0.5;

  // Helper: build one slotted sub-box (always open-top) inside a subGroup
  // xFlatOff: X offset of frontGroup in flat state (becomes 0 in erected)
  const buildSub = (subGroup, bH, col1, col2, col3, xFlatOff) => {
    const fg = new THREE.Group();
    fg.position.set(xFlatOff*SC, 0, -W/2*SC);
    subGroup.add(fg);
    fg.add(mkMesh(L, bH, bT, col1));

    const cap = 0.88;
    const bMj = W/2, bMn = W/2 * 0.88;

    const mkF = (par, lx, ly, moff, fw, fh, col) => {
      if (!fh) return null;
      const h = new THREE.Group(); h.position.set(lx*SC,ly*SC,0); par.add(h);
      const m = mkMesh(fw,fh,bT,col); m.position.y=moff*SC; h.add(m); return h;
    };

    const fbH = mkF(fg,  0, -bH/2, -bMj/2, L, bMj, col3);
    const lHg = new THREE.Group(); lHg.position.x=-L/2*SC; fg.add(lHg);
    mkMesh(W,bH,bT,col2) && (() => { const m=mkMesh(W,bH,bT,col2); m.position.x=-W/2*SC; lHg.add(m); })();
    const s1b = mkF(lHg,-W/2,-bH/2,-bMn/2,W,bMn,col3);
    const bHg = new THREE.Group(); bHg.position.x=-W*SC; lHg.add(bHg);
    (() => { const m=mkMesh(L,bH,bT,col1); m.position.x=-L/2*SC; bHg.add(m); })();
    const bkb = mkF(bHg,-L/2,-bH/2,-bMj/2,L,bMj,col3);
    const rHg = new THREE.Group(); rHg.position.x=-L*SC; bHg.add(rHg);
    (() => { const m=mkMesh(W,bH,bT,col2); m.position.x=-W/2*SC; rHg.add(m); })();
    const s2b = mkF(rHg,-W/2,-bH/2,-bMn/2,W,bMn,col3);
    const ghg = new THREE.Group(); ghg.position.x=-W*SC; rHg.add(ghg);
    (() => { const m=mkMesh(g,bH,bT,K.glueTab); m.position.x=-g/2*SC; ghg.add(m); })();

    // Return animate function for this sub-box
    return (t) => {
      const bdy = ease(clamp(t/0.52,0,1))*PIH;
      lHg.rotation.y=bdy; bHg.rotation.y=bdy; rHg.rotation.y=bdy; ghg.rotation.y=bdy*1.04;
      const mn = -ease(clamp((t-0.20)/0.36,0,1))*PIH*cap;
      if(s1b) s1b.rotation.x=mn; if(s2b) s2b.rotation.x=mn;
      const mj = -ease(clamp((t-0.32)/0.36,0,1))*PIH;
      if(fbH) fbH.rotation.x=mj; if(bkb) bkb.rotation.x=mj;
      // bring fg X offset to 0 as box erects
      fg.position.x = lrp(xFlatOff*SC, 0, ease(clamp(t/0.52,0,1)));
    };
  };

  const baseGrp = new THREE.Group();
  group.add(baseGrp);
  const lidGrp = new THREE.Group();
  group.add(lidGrp);

  const animBase = buildSub(baseGrp, H,   K.outerFace, K.sideWall, K.innerFlap, 0);
  const animLid  = buildSub(lidGrp,  lidH, K.lidWall,  K.sideWall, K.innerFlap, BW+gap);

  return (t) => {
    animBase(t);
    animLid(t);
    // Lid rises above base after both assembled (t 0.60→1.00)
    const rise = ease(clamp((t-0.60)/0.40,0,1));
    lidGrp.position.y  = lrp(0, (H/2 + lidH/2 + bT*3)*SC, rise);
    baseGrp.position.y = lrp(0, -(lidH/2 + bT)*SC * 0.5, rise);
  };
}

// ─── Camera framing ───────────────────────────────────────────────────────────
function frameCamera(cam, L, W, H, style) {
  const g      = Math.max(28, Math.round(W * 0.12));
  const flatW  = g + 2*W + 2*L;
  const maxDim = Math.max(flatW, H) * SC;
  const dist   = style === "0713" ? maxDim * 2.2 : maxDim * 1.55;
  cam.position.set(maxDim * 0.35, maxDim * 0.22, dist);
  cam.lookAt(0, 0, 0);
  cam.updateProjectionMatrix();
}

// ─── Box3D Component ──────────────────────────────────────────────────────────
function Box3D({
  L = 380, W = 260, H = 200,
  style = "0201",
  lidH = 60,
  boardThickness = 4,
  productGeometry = null,
  productBBox = null,
  productClearance = {top:10,bottom:10,left:8,right:8,front:8,back:8},
  productOrientation = "upright",
  onCollisionUpdate = null,
}) {
  const mountRef  = useRef(null);
  const stRef     = useRef(null);   // Three.js state
  const animRef   = useRef(null);   // current animate(t) fn
  const tRef      = useRef(0);
  const playRef   = useRef(false);
  const dragRef   = useRef({ on:false, x:0, y:0 });
  const autoRef   = useRef(true);
  const rafRef    = useRef(null);
  const productLayerRef = useRef({mat:null,wireMat:null});

  const [tUI, setTUI]         = useState(0);
  const [playing, setPlaying] = useState(false);

  // Init Three.js once
  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;
    const W3 = mount.clientWidth || 380, H3 = 300;

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(W3, H3);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0xF0EDE6, 1);  // warm ArtiosCAD-like background
    mount.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(36, W3/H3, 0.1, 2000);

    // Warm lighting for cardboard
    scene.add(new THREE.AmbientLight(0xFFF5E0, 0.55));
    const key  = new THREE.DirectionalLight(0xFFF0CC, 1.05); key.position.set(80,110,70);   scene.add(key);
    const fill = new THREE.DirectionalLight(0xCCDDFF, 0.32); fill.position.set(-60,20,-80); scene.add(fill);
    const rim  = new THREE.DirectionalLight(0xFFE8A0, 0.18); rim.position.set(10,-60,40);   scene.add(rim);

    const root   = new THREE.Group();
    root.rotation.x = 0.30;
    root.rotation.y = 0.20;
    scene.add(root);

    const carton = new THREE.Group();
    root.add(carton);

    stRef.current = { renderer, scene, camera, root, carton };

    const el = renderer.domElement;
    const dn = e => { dragRef.current={on:true,x:e.clientX,y:e.clientY}; autoRef.current=false; };
    const mv = e => {
      if (!dragRef.current.on) return;
      root.rotation.y += (e.clientX - dragRef.current.x) * 0.013;
      root.rotation.x  = clamp(root.rotation.x + (e.clientY - dragRef.current.y) * 0.009, -1.4, 1.4);
      dragRef.current.x = e.clientX; dragRef.current.y = e.clientY;
    };
    const up = () => { dragRef.current.on = false; };
    el.addEventListener("pointerdown", dn);
    el.addEventListener("pointermove", mv);
    el.addEventListener("pointerup",   up);
    el.addEventListener("pointerleave",up);

    const tick = () => {
      rafRef.current = requestAnimationFrame(tick);
      if (playRef.current) {
        tRef.current = clamp(tRef.current + 0.007, 0, 1);
        setTUI(tRef.current);
        animRef.current?.(tRef.current);
        if (tRef.current >= 1) { playRef.current=false; setPlaying(false); }
      }
      if (autoRef.current) root.rotation.y += 0.004;
      renderer.render(scene, camera);
    };
    tick();

    return () => {
      cancelAnimationFrame(rafRef.current);
      el.removeEventListener("pointerdown", dn);
      el.removeEventListener("pointermove", mv);
      el.removeEventListener("pointerup",   up);
      el.removeEventListener("pointerleave",up);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, []); // eslint-disable-line

  // Rebuild on prop changes
  useEffect(() => {
    const st = stRef.current;
    if (!st) return;
    clearGroup(st.carton);
    animRef.current = null;

    const L_ = Math.max(50,L), W_ = Math.max(40,W), H_ = Math.max(30,H);
    const lH = Math.max(20,lidH), bT = Math.max(1,boardThickness);

    const fn = style === "0300" ? buildTray(L_,W_,H_,bT,st.carton)
             : style === "0713" ? buildTelescope(L_,W_,H_,lH,bT,st.carton)
             :                    buildSlotted(L_,W_,H_,style,bT,st.carton);

    let productMat=null,wireMat=null,pMesh=null;
    const checkCollisions=(productDims)=>{
      const prodBox=new THREE.Box3(
        new THREE.Vector3(-(productDims.L/2)*SC, -(productDims.H/2)*SC, -(productDims.W/2)*SC),
        new THREE.Vector3((productDims.L/2)*SC, (productDims.H/2)*SC, (productDims.W/2)*SC),
      );
      let n=0;
      st.carton.traverse(obj=>{
        if(!obj?.isMesh||obj===pMesh||obj.userData?.isClearanceWire)return;
        const m=obj.material;
        if(!m||Array.isArray(m))return;
        if(!obj.userData.baseColor)obj.userData.baseColor=m.color?.getHex?.()??0xffffff;
        const box=new THREE.Box3().setFromObject(obj);
        const hit=box.intersectsBox(prodBox);
        if(hit){
          n++;
          m.color?.setHex?.(0xFF4444);
          m.emissive?.setHex?.(0xFF0000);
          m.emissiveIntensity=0.2;
        }else{
          m.color?.setHex?.(obj.userData.baseColor);
          m.emissive?.setHex?.(0x000000);
          m.emissiveIntensity=0;
        }
      });
      onCollisionUpdate?.(n);
    };
    const clearCollisionTint=()=>{
      st.carton.traverse(obj=>{
        if(!obj?.isMesh||obj===pMesh||obj.userData?.isClearanceWire)return;
        const m=obj.material;if(!m||Array.isArray(m))return;
        if(obj.userData.baseColor)m.color?.setHex?.(obj.userData.baseColor);
        m.emissive?.setHex?.(0x000000);m.emissiveIntensity=0;
      });
      onCollisionUpdate?.(-1);
    };
    if(productGeometry&&productBBox){
      const geom=productGeometry.clone();
      geom.computeBoundingBox();
      const centre=new THREE.Vector3();geom.boundingBox.getCenter(centre);
      const rawSize=new THREE.Vector3();geom.boundingBox.getSize(rawSize);
      pMesh=new THREE.Mesh(geom,new THREE.MeshStandardMaterial({
        color:0x88BBDD,roughness:0.3,metalness:0.05,transparent:true,opacity:0,side:THREE.DoubleSide,
      }));
      pMesh.position.set(-centre.x*SC,-centre.y*SC,-centre.z*SC);
      if(productOrientation==="side")pMesh.rotation.set(Math.PI/2,0,0);
      else if(productOrientation==="rotated")pMesh.rotation.set(0,Math.PI/2,0);
      else pMesh.rotation.set(0,0,0);
      const sx=rawSize.x>0?(productBBox.L*SC)/rawSize.x:1;
      const sy=rawSize.y>0?(productBBox.H*SC)/rawSize.y:1;
      const sz=rawSize.z>0?(productBBox.W*SC)/rawSize.z:1;
      pMesh.scale.set(sx,sy,sz);
      productMat=pMesh.material;
      st.carton.add(pMesh);
      const clearW=(productBBox.L+productClearance.left+productClearance.right)*SC;
      const clearH=(productBBox.H+productClearance.top+productClearance.bottom)*SC;
      const clearD=(productBBox.W+productClearance.front+productClearance.back)*SC;
      const offsetX=((productClearance.right-productClearance.left)/2)*SC;
      const offsetY=((productClearance.top-productClearance.bottom)/2)*SC;
      const offsetZ=((productClearance.front-productClearance.back)/2)*SC;
      const clearWire=new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(clearW,clearH,clearD)),
        new THREE.LineBasicMaterial({color:0x22CC88,transparent:true,opacity:0})
      );
      clearWire.userData.isClearanceWire=true;
      clearWire.position.set(offsetX,offsetY,offsetZ);
      wireMat=clearWire.material;
      st.carton.add(clearWire);
    }

    animRef.current = (t)=>{
      fn(t);
      const op=t<0.4?0:Math.min(0.55,((t-0.4)/0.25)*0.55);
      if(productMat)productMat.opacity=op;
      if(wireMat)wireMat.opacity=op;
      if(productBBox){
        if(t>0.85)checkCollisions(productBBox);
        else clearCollisionTint();
      }
    };
    productLayerRef.current={mat:productMat,wireMat};
    animRef.current(tRef.current);
    frameCamera(st.camera, L_, W_, H_, style);
  }, [L, W, H, style, lidH, boardThickness, productGeometry, productBBox, productClearance, productOrientation, onCollisionUpdate]);

  const handlePlay = () => {
    if (tRef.current >= 1) { tRef.current=0; setTUI(0); animRef.current?.(0); }
    playRef.current = !playing; setPlaying(!playing);
  };
  const scrub = e => {
    const v = parseFloat(e.target.value)/100;
    tRef.current=v; setTUI(v); playRef.current=false; setPlaying(false); animRef.current?.(v);
  };
  const jump = v => {
    tRef.current=v; setTUI(v); playRef.current=false; setPlaying(false); animRef.current?.(v);
  };

  const pct = Math.round(tUI * 100);
  const PU = "#5B3D9E";

  return (
    <div style={{ background:"#FDFAF5", borderRadius:10, overflow:"hidden", userSelect:"none" }}>
      <div ref={mountRef} style={{ width:"100%", height:300, position:"relative" }}>
        <span style={{ position:"absolute",top:6,left:8,fontSize:9,fontWeight:700,
          color:"#7A5C20",background:"rgba(255,245,210,.88)",padding:"2px 8px",borderRadius:4,letterSpacing:1 }}>
          {style}
        </span>
        <span style={{ position:"absolute",top:6,right:8,fontSize:8,color:"#9B8060",
          background:"rgba(255,250,240,.80)",padding:"2px 7px",borderRadius:4,pointerEvents:"none" }}>
          drag to rotate
        </span>
      </div>

      <div style={{ padding:"9px 12px 11px", borderTop:"1px solid #E8E0CE", background:"#FDFAF5" }}>
        <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:7 }}>
          <span style={{ fontSize:9,fontFamily:"monospace",color:"#7A6040",minWidth:28,textAlign:"right" }}>
            {pct<4?"flat":pct>96?"up":`${pct}%`}
          </span>
          <div style={{ flex:1,position:"relative",height:18,display:"flex",alignItems:"center" }}>
            <div style={{ position:"absolute",left:0,right:0,height:3,background:"#E0CFA8",borderRadius:2 }}/>
            <div style={{ position:"absolute",left:0,width:`${pct}%`,height:3,background:PU,borderRadius:2 }}/>
            <input type="range" min={0} max={100} value={pct} onChange={scrub} style={{
              position:"absolute",left:0,right:0,width:"100%",
              WebkitAppearance:"none",appearance:"none",background:"transparent",cursor:"pointer",height:18,margin:0 }}/>
          </div>
        </div>

        <div style={{ display:"flex",gap:5,alignItems:"center" }}>
          <button onClick={handlePlay} style={{
            width:30,height:30,borderRadius:7,border:"none",background:PU,
            color:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12 }}>
            {playing?"Pause":"Play"}
          </button>
          {[["Flat",0],["Half",0.5],["Up",1]].map(([lbl,v])=>(
            <button key={lbl} onClick={()=>jump(v)} style={{
              border:`1px solid ${Math.abs(tUI-v)<0.04?PU:"#D0C0A0"}`,
              background:Math.abs(tUI-v)<0.04?"#EDE9FE":"white",
              color:Math.abs(tUI-v)<0.04?PU:"#7A6040",
              padding:"4px 9px",borderRadius:6,fontSize:9,fontWeight:600,cursor:"pointer" }}>
              {lbl}
            </button>
          ))}
          <span style={{ marginLeft:"auto",fontSize:9,color:"#9B8060",fontFamily:"monospace" }}>
            {L}x{W}x{H}mm
          </span>
        </div>
      </div>

      <style>{`
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
          background:${PU};cursor:pointer;border:2px solid white;box-shadow:0 1px 5px rgba(91,61,158,.4);}
        input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
          background:${PU};cursor:pointer;border:2px solid white;}
      `}</style>
    </div>
  );
}

// ─── 3D Product-in-carton viewer ──────────────────────────────────────────────
const SCALE=0.06;
function ProductInCarton3D({box,product,fillPattern}){
  const mountRef=useRef(null);
  useEffect(()=>{
    const mount=mountRef.current;if(!mount)return;
    const width=mount.clientWidth||340,height=240;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(width,height);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    mount.appendChild(renderer.domElement);
    const scene=new THREE.Scene();scene.background=new THREE.Color(0xF9F8F6);
    const camera=new THREE.PerspectiveCamera(38,width/height,.1,5000);
    const maxDim=Math.max(box.L,box.W,box.H)*SCALE;
    camera.position.set(maxDim*1.2,maxDim*1.0,maxDim*3.0);camera.lookAt(0,0,0);
    scene.add(new THREE.AmbientLight(0xffffff,.82));
    const d1=new THREE.DirectionalLight(0xffffff,.8);d1.position.set(90,100,80);scene.add(d1);
    const root=new THREE.Group();root.rotation.x=.28;root.rotation.y=.52;scene.add(root);
    root.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(box.L*SCALE,box.H*SCALE,box.W*SCALE)),new THREE.LineBasicMaterial({color:0x7C3AED})));
    const productMat=new THREE.MeshStandardMaterial({color:0x60A5FA,roughness:.45});
    (fillPattern?.placements?.slice(0,120)||[]).forEach(p=>{
      const o=p.orientation;if(!o)return;
      let mesh;
      if(product.type==="box"){mesh=new THREE.Mesh(new THREE.BoxGeometry(o.L*SCALE,o.H*SCALE,o.W*SCALE),productMat);}
      else if(o.kind==="cylinder-upright"){mesh=new THREE.Mesh(new THREE.CylinderGeometry(o.diameter*SCALE/2,o.diameter*SCALE/2,o.H*SCALE,20),productMat);}
      else{mesh=new THREE.Mesh(new THREE.CylinderGeometry((o.diameter||product.diameter)*SCALE/2,(o.diameter||product.diameter)*SCALE/2,(o.length||product.H)*SCALE,20),productMat);mesh.rotation.z=Math.PI/2;}
      mesh.position.set(p.x*SCALE,p.y*SCALE,p.z*SCALE);root.add(mesh);
    });
    let drag=false,autoSpin=true,px=0,py=0;
    const el=renderer.domElement;
    el.addEventListener("pointerdown",e=>{drag=true;autoSpin=false;px=e.clientX;py=e.clientY;});
    el.addEventListener("pointermove",e=>{if(!drag)return;root.rotation.y+=(e.clientX-px)*.012;root.rotation.x=clamp(root.rotation.x+(e.clientY-py)*.008,-1.2,1.2);px=e.clientX;py=e.clientY;});
    el.addEventListener("pointerup",()=>{drag=false;});
    let raf=0;const tick=()=>{raf=requestAnimationFrame(tick);if(autoSpin)root.rotation.y+=.0025;renderer.render(scene,camera);};tick();
    return()=>{cancelAnimationFrame(raf);productMat.dispose();renderer.dispose();if(mount.contains(renderer.domElement))mount.removeChild(renderer.domElement);};
  },[box,product,fillPattern]);
  return(<div style={{position:"relative"}}><div ref={mountRef} style={{width:"100%",height:240}}/><div style={{position:"absolute",bottom:6,right:8,fontSize:8,color:T.textLight,background:T.surface+"cc",padding:"2px 6px",borderRadius:5}}>drag to rotate</div></div>);
}

// ─── 3D Pallet viewer ─────────────────────────────────────────────────────────
function Pallet3D({box,pallet,palletPattern}){
  const mountRef=useRef(null);
  const camRef=useRef(null);
  const zoomRef=useRef(1);

  const doZoom=(delta)=>{
    if(!camRef.current)return;
    const cam=camRef.current;
    zoomRef.current=clamp(zoomRef.current+delta,0.3,3.5);
    const base=Math.max(pallet.L,pallet.W,pallet.maxH)*0.018;
    const d=base*2.8/zoomRef.current;
    cam.position.set(d*0.55,d*0.42,d);
    cam.lookAt(0,0,0);
  };

  useEffect(()=>{
    const mount=mountRef.current;if(!mount)return;
    const PS=0.015;
    const W3=mount.clientWidth||460,H3=340;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(W3,H3);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled=true;
    mount.appendChild(renderer.domElement);
    const scene=new THREE.Scene();scene.background=new THREE.Color(0xF2F0EC);

    const camera=new THREE.PerspectiveCamera(36,W3/H3,.1,8000);
    camRef.current=camera;
    const base=Math.max(pallet.L,pallet.W,pallet.maxH)*PS;
    camera.position.set(base*0.55*2.8,base*0.42*2.8,base*2.8);
    camera.lookAt(0,0,0);

    scene.add(new THREE.AmbientLight(0xffffff,.65));
    const sun=new THREE.DirectionalLight(0xfff8e8,1.1);
    sun.position.set(200,350,200);sun.castShadow=true;
    sun.shadow.mapSize.set(1024,1024);
    sun.shadow.camera.left=-800*PS;sun.shadow.camera.right=800*PS;
    sun.shadow.camera.top=800*PS;sun.shadow.camera.bottom=-800*PS;
    scene.add(sun);
    const fill=new THREE.DirectionalLight(0xd0e8ff,.35);fill.position.set(-150,80,-200);scene.add(fill);

    const root=new THREE.Group();root.rotation.x=.18;root.rotation.y=.42;scene.add(root);

    // ── Pallet deck ──────────────────────────────────────────────────────────
    const palH=144*PS;
    const palW=pallet.L*PS,palD=pallet.W*PS;
    // Deck boards (top surface slats)
    const deckMat=new THREE.MeshStandardMaterial({color:0xC4944A,roughness:.9});
    const legMat =new THREE.MeshStandardMaterial({color:0xB07840,roughness:.95});
    const deckY=-pallet.maxH*PS/2+palH*0.72;
    // 3 top slat blocks
    [[0,0],[-.32,0],[.32,0]].forEach(([ox,oz])=>{
      const s=new THREE.Mesh(new THREE.BoxGeometry(palW,palH*0.22,palD*.28),deckMat);
      s.position.set(ox*palW,deckY,oz*palD);s.receiveShadow=true;root.add(s);
    });
    // Full top deck plank
    const deck=new THREE.Mesh(new THREE.BoxGeometry(palW,palH*0.15,palD),deckMat);
    deck.position.y=deckY+palH*0.18;deck.receiveShadow=true;root.add(deck);
    // 3 pallet legs
    [-.4,0,.4].forEach(ox=>{
      const leg=new THREE.Mesh(new THREE.BoxGeometry(palW*.28,palH*.55,palD),legMat);
      leg.position.set(ox*palW,-pallet.maxH*PS/2+palH*.27,0);leg.receiveShadow=true;root.add(leg);
    });
    // Bottom boards
    [-.4,0,.4].forEach(oz=>{
      const b=new THREE.Mesh(new THREE.BoxGeometry(palW,palH*.12,palD*.2),deckMat);
      b.position.set(0,-pallet.maxH*PS/2+palH*.06,oz*palD);b.receiveShadow=true;root.add(b);
    });

    // Collect all materials for cleanup
    const allMats=[deckMat,legMat];

    // ── Cartons ──────────────────────────────────────────────────────────────
    if(palletPattern&&box.L>0&&box.W>0&&box.H>0){
      const cH=box.H*PS;
      const maxLayers=Math.max(1,palletPattern.maxLayers||1);
      const layerTemplates=palletPattern.layerTemplates||[{placements:[]}];
      const baseY=deckY+palH*0.18+palH*0.075+cH/2;
      const forceAmber=palletPattern.strategy==="column";

      // Two colour sets: normal orientation (warm amber), rotated (cooler tan)
      // So you can visually distinguish orientations in interlocked/pinwheel
      const matNormal=new THREE.MeshStandardMaterial({color:0xD4A843,roughness:.80});
      const matRotated=new THREE.MeshStandardMaterial({color:0x8BAEC4,roughness:.80});
      allMats.push(matNormal,matRotated);
      const edgeMat=new THREE.LineBasicMaterial({color:0x6A5820,linewidth:1});

      for(let k=0;k<Math.min(maxLayers,10);k++){
        const tmpl=layerTemplates[k%layerTemplates.length];
        (tmpl.placements||[]).forEach(p=>{
          const cL=(p.rotated?box.W:box.L)*PS;
          const cW=(p.rotated?box.L:box.W)*PS;
          const cx=p.x*PS, cz=p.z*PS, cy=baseY+k*cH;
          // Guard: skip if box centre is more than half its footprint outside pallet
          if(Math.abs(cx)>palW/2+cL*.1||Math.abs(cz)>palD/2+cW*.1)return;
          const mat=forceAmber?matNormal:(p.rotated?matRotated:matNormal);
          const geo=new THREE.BoxGeometry(cL*.97,cH*.97,cW*.97);
          const mesh=new THREE.Mesh(geo,mat);
          mesh.position.set(cx,cy,cz);mesh.castShadow=true;mesh.receiveShadow=true;root.add(mesh);
          const edges=new THREE.LineSegments(new THREE.EdgesGeometry(geo),edgeMat);
          edges.position.set(cx,cy,cz);root.add(edges);
        });
      }
    }

    // Pallet footprint outline on ground
    const outlineGeo=new THREE.EdgesGeometry(new THREE.BoxGeometry(palW,0.002,palD));
    const outline=new THREE.LineSegments(outlineGeo,new THREE.LineBasicMaterial({color:0xBBAA88,linewidth:1}));
    outline.position.y=-pallet.maxH*PS/2;root.add(outline);

    let drag=false,autoSpin=true,px=0,py=0;
    const el=renderer.domElement;
    el.addEventListener("pointerdown",e=>{drag=true;autoSpin=false;px=e.clientX;py=e.clientY;});
    el.addEventListener("pointermove",e=>{if(!drag)return;root.rotation.y+=(e.clientX-px)*.012;root.rotation.x=clamp(root.rotation.x+(e.clientY-py)*.008,-1.2,1.2);px=e.clientX;py=e.clientY;});
    el.addEventListener("pointerup",()=>{drag=false;});
    el.addEventListener("wheel",e=>{e.preventDefault();doZoom(e.deltaY>0?-0.12:0.12);},{passive:false});

    let raf=0;const tick=()=>{raf=requestAnimationFrame(tick);if(autoSpin)root.rotation.y+=.003;renderer.render(scene,camera);};tick();
    return()=>{
      cancelAnimationFrame(raf);
      allMats.forEach(m=>m&&m.dispose&&m.dispose());
      renderer.dispose();
      if(mount.contains(renderer.domElement))mount.removeChild(renderer.domElement);
    };
  },[box,pallet,palletPattern]);

  return(
    <div style={{position:"relative"}}>
      <div ref={mountRef} style={{width:"100%",height:340}}/>
      {patternHasMixedOrientations(palletPattern)&&(
        <div style={{position:"absolute",top:6,left:8,fontSize:8,color:T.textMid,background:"rgba(255,252,248,.90)",padding:"5px 7px",borderRadius:6,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
            <span style={{width:10,height:10,display:"inline-block",background:"#D4A843",borderRadius:2,border:"1px solid #9A7A2F"}}/>
            <span>Normal (L along pallet length)</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:10,height:10,display:"inline-block",background:"#8BAEC4",borderRadius:2,border:"1px solid #6F8EA1"}}/>
            <span>Rotated 90° (W along pallet length)</span>
          </div>
        </div>
      )}
      {/* Zoom controls */}
      <div style={{position:"absolute",bottom:8,right:8,display:"flex",flexDirection:"column",gap:4}}>
        {[["+","zoom in",0.25],["-","zoom out",-0.25]].map(([lbl,title,d])=>(
          <button key={lbl} title={title} onClick={()=>doZoom(d)} style={{
            width:28,height:28,borderRadius:6,border:"1px solid #D0C8B8",
            background:"rgba(255,252,248,.92)",color:"#5A4820",fontSize:16,fontWeight:700,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
            {lbl}
          </button>
        ))}
      </div>
      <div style={{position:"absolute",top:6,right:8,fontSize:8,color:"#9B8060",background:"rgba(255,250,240,.80)",padding:"2px 7px",borderRadius:4,pointerEvents:"none"}}>
        drag | scroll to zoom
      </div>
    </div>
  );
}
// ─── Die-cut flat view ────────────────────────────────────────────────────────
function DieCutSlotted({L,W,H,style,selected,onSelect,onPanelCentroids,featurePaths=[],eligiblePanelIds=[],productBBox=null,productClearance=null}){
  const lay=useMemo(()=>{
    const VW=340,VH=220,PAD=28;
    const flapCfg=FEFCO[style]?.flaps?.(W)||FEFCO["0201"].flaps(W);
    const geo=calcSlotted(L,W,H,flapCfg);
    const{topH,btmH,tMj,tMn,bMj,bMn,blankW,blankH,xs}=geo;
    const sc=Math.min((VW-2*PAD)/blankW,(VH-2*PAD)/blankH);
    const sw=blankW*sc,sh=blankH*sc;
    const ox=(VW-sw)/2,oy=(VH-sh)/2;
    const[x0s,x1s,x2s,x3s,x4s,x5s]=xs.map(x=>x*sc);
    const y0s=0,y1s=btmH*sc,y2s=(btmH+H)*sc,y3s=sh;
    const hitPanels=[
      {id:"glue",x:x0s,y:y1s,w:x1s,h:y2s-y1s,ctrl:"W"},
      {id:"bW1",x:x1s,y:y1s,w:x2s-x1s,h:y2s-y1s,ctrl:"W"},
      {id:"bL1",x:x2s,y:y1s,w:x3s-x2s,h:y2s-y1s,ctrl:"L"},
      {id:"bW2",x:x3s,y:y1s,w:x4s-x3s,h:y2s-y1s,ctrl:"W"},
      {id:"bL2",x:x4s,y:y1s,w:x5s-x4s,h:y2s-y1s,ctrl:"L"},
      ...(btmH>0?[{id:"bfW1",x:x1s,y:y1s-bMn*sc,w:x2s-x1s,h:bMn*sc,ctrl:"W"},{id:"bfL1",x:x2s,y:y1s-bMj*sc,w:x3s-x2s,h:bMj*sc,ctrl:"W"},{id:"bfW2",x:x3s,y:y1s-bMn*sc,w:x4s-x3s,h:bMn*sc,ctrl:"W"},{id:"bfL2",x:x4s,y:y1s-bMj*sc,w:x5s-x4s,h:bMj*sc,ctrl:"W"}]:[]),
      ...(topH>0?[{id:"tfW1",x:x1s,y:y2s,w:x2s-x1s,h:tMn*sc,ctrl:"W"},{id:"tfL1",x:x2s,y:y2s,w:x3s-x2s,h:tMj*sc,ctrl:"W"},{id:"tfW2",x:x3s,y:y2s,w:x4s-x3s,h:tMn*sc,ctrl:"W"},{id:"tfL2",x:x4s,y:y2s,w:x5s-x4s,h:tMj*sc,ctrl:"W"}]:[]),
    ];
    const centroids=hitPanels.map(p=>({id:p.id,cx:(ox+p.x+p.w/2)/VW,cy:(oy+p.y+p.h/2)/VH}));
    return{VW,VH,sc,sw,sh,ox,oy,x0s,x1s,x2s,x3s,x4s,x5s,y0s,y1s,y2s,y3s,hitPanels,centroids,CW:1.4,CSW:1.0,topH,btmH,tMj,tMn,bMj,bMn};
  },[L,W,H,style]);

  useLayoutEffect(()=>{onPanelCentroids?.(lay.centroids);},[lay.centroids,onPanelCentroids]);

  const{VW,VH,sc,sw,sh,ox,oy,x0s,x1s,x2s,x3s,x4s,x5s,y0s,y1s,y2s,y3s,hitPanels,CW,CSW,topH,btmH,tMj,tMn,bMj,bMn}=lay;
  const prodOverlay=useMemo(()=>{
    if(!productBBox||!productClearance)return null;
    const panelCentreX=(x1s+x2s)/2,panelCentreY=(y1s+y2s)/2;
    const prodSVGW=productBBox.L*sc,prodSVGH=productBBox.H*sc;
    const prodX=panelCentreX-prodSVGW/2,prodY=panelCentreY-prodSVGH/2;
    const clearSVGW=(productBBox.L+productClearance.left+productClearance.right)*sc;
    const clearSVGH=(productBBox.H+productClearance.top+productClearance.bottom)*sc;
    const clearX=panelCentreX-clearSVGW/2,clearY=panelCentreY-clearSVGH/2;
    return{prodX,prodY,prodSVGW,prodSVGH,panelCentreX,panelCentreY,clearX,clearY,clearSVGW,clearSVGH};
  },[productBBox,productClearance,sc,x1s,x2s,y1s,y2s]);
  return(
    <svg viewBox={`0 0 ${VW} ${VH}`} style={{width:"100%",display:"block"}} onClick={e=>{if(e.target===e.currentTarget)onSelect(null);}}>
      <rect width={VW} height={VH} fill="#F0EEE9"/><rect x={ox} y={oy} width={sw} height={sh} fill="white"/>
      <g transform={`translate(${ox},${oy})`}>
        {hitPanels.map(p=>{if(selected!==p.id)return null;const c={W:T.green,L:T.purple,H:T.blue}[p.ctrl]||T.purple;return<rect key={p.id} x={p.x} y={p.y} width={p.w} height={p.h} fill={c+"33"} stroke={c} strokeWidth={1.5} style={{pointerEvents:"none"}}/>;  })}
        {eligiblePanelIds.map(id=>{
          const p=hitPanels.find(v=>v.id===id);
          if(!p)return null;
          return <rect key={`el-${id}`} x={p.x} y={p.y} width={Math.max(p.w,1)} height={Math.max(p.h,1)} fill="none" stroke={T.purple} strokeWidth={0.8} strokeDasharray="3 2" opacity={0.6}/>;
        })}
        {[x2s,x3s,x4s].map((x,i)=><line key={i} x1={x} y1={y1s} x2={x} y2={y2s} stroke={AC.CREASE} strokeWidth={CSW} strokeDasharray="4 3"/>)}
        {btmH>0&&<line x1={x1s} y1={y1s} x2={x5s} y2={y1s} stroke={AC.CREASE} strokeWidth={CSW} strokeDasharray="4 3"/>}
        {topH>0&&<line x1={x1s} y1={y2s} x2={x5s} y2={y2s} stroke={AC.CREASE} strokeWidth={CSW} strokeDasharray="4 3"/>}
        <rect x={0} y={0} width={sw} height={sh} fill="none" stroke={AC.CUT} strokeWidth={CW}/>
        <line x1={x1s} y1={y1s} x2={x1s} y2={y2s} stroke={AC.CUT} strokeWidth={CW}/>
        {btmH>0&&[x1s,x2s,x3s,x4s].map((x,i)=><line key={i} x1={x} y1={y0s} x2={x} y2={y1s} stroke={AC.CUT} strokeWidth={CW}/>)}
        {topH>0&&[x1s,x2s,x3s,x4s].map((x,i)=><line key={i} x1={x} y1={y2s} x2={x} y2={y3s} stroke={AC.CUT} strokeWidth={CW}/>)}
        {btmH>0&&bMn<btmH&&<><line x1={x1s} y1={y1s-bMn*sc} x2={x2s} y2={y1s-bMn*sc} stroke={AC.CUT} strokeWidth={CW}/><line x1={x3s} y1={y1s-bMn*sc} x2={x4s} y2={y1s-bMn*sc} stroke={AC.CUT} strokeWidth={CW}/></>}
        {topH>0&&tMn<topH&&<><line x1={x1s} y1={y2s+tMn*sc} x2={x2s} y2={y2s+tMn*sc} stroke={AC.CUT} strokeWidth={CW}/><line x1={x3s} y1={y2s+tMn*sc} x2={x4s} y2={y2s+tMn*sc} stroke={AC.CUT} strokeWidth={CW}/></>}
        {prodOverlay&&<>
          <rect x={prodOverlay.prodX} y={prodOverlay.prodY} width={prodOverlay.prodSVGW} height={prodOverlay.prodSVGH} fill="rgba(136,187,221,0.15)" stroke="#88BBDD" strokeWidth={0.8} strokeDasharray="3 2"/>
          <rect x={prodOverlay.clearX} y={prodOverlay.clearY} width={prodOverlay.clearSVGW} height={prodOverlay.clearSVGH} fill="none" stroke="rgba(136,187,221,0.6)" strokeWidth={0.8} strokeDasharray="2 2"/>
          <text x={prodOverlay.panelCentreX} y={prodOverlay.panelCentreY} textAnchor="middle" dominantBaseline="middle" fill="#88BBDD" fontSize={7} fontFamily="monospace">product</text>
        </>}
        {featurePaths.map(f=>{
          const stroke=f.kind==="crease"?AC.CREASE:AC.CUT;
          const dash=f.kind==="crease"?"2 2":"none";
          const d=(f.svgPath||"").replace(/-?\d+(\.\d+)?/g,n=>String(Number(n)*sc));
          return <path key={f.id} d={d} fill="none" stroke={stroke} strokeDasharray={dash} strokeWidth={f.preview?1.1:1.3} opacity={f.preview?0.75:1}/>;
        })}
        {[[x0s,x1s,"gl","",T.textLight],[x1s,x2s,"W",`${W}`,T.green],[x2s,x3s,"L",`${L}`,T.purple],[x3s,x4s,"W",`${W}`,T.green],[x4s,x5s,"L",`${L}`,T.purple]].map(([xa,xb,lbl,sub,c],i)=>{
          const tx=(xa+xb)/2,ty=(y1s+y2s)/2,fs=Math.min((x3s-x2s)*.2,9);
          if(xb-xa<12)return null;
          return(<g key={i}><text x={tx} y={ty-(sub?4:0)} textAnchor="middle" dominantBaseline="middle" fill={c} fontSize={fs} fontFamily="monospace">{lbl}</text>{sub&&<text x={tx} y={ty+6} textAnchor="middle" dominantBaseline="middle" fill={c} fontSize={Math.min(fs-1,8)} fontFamily="monospace" opacity={.8}>{sub}mm</text>}</g>);
        })}
        {hitPanels.map(p=><rect key={`h-${p.id}`} x={p.x} y={p.y} width={Math.max(p.w,1)} height={Math.max(p.h,1)} fill="transparent" style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onSelect(selected===p.id?null:p.id);}}/>)}
      </g>
      {[[x1s,x2s,"W",T.green],[x2s,x3s,"L",T.purple],[x3s,x4s,"W",T.green],[x4s,x5s,"L",T.purple]].map(([xa,xb,lbl,c],i)=>(<text key={i} x={ox+(xa+xb)/2} y={oy+y3s+12} textAnchor="middle" fill={c} fontSize={7} fontFamily="monospace">{lbl}</text>))}
      <text x={ox+x5s+12} y={oy+(y1s+y2s)/2} textAnchor="middle" dominantBaseline="middle" fill="#555" fontSize={7} fontFamily="monospace">H</text>
      {prodOverlay&&(
        <g>
          <rect x={ox+2} y={VH-16} width={8} height={5} fill="none" stroke="#88BBDD" strokeWidth={0.8} strokeDasharray="3 2"/>
          <text x={ox+13} y={VH-12} fill="#88BBDD" fontSize={7} fontFamily="monospace">product footprint</text>
          <rect x={ox+88} y={VH-16} width={8} height={5} fill="none" stroke="rgba(136,187,221,0.6)" strokeWidth={0.8} strokeDasharray="2 2"/>
          <text x={ox+99} y={VH-12} fill="#88BBDD" fontSize={7} fontFamily="monospace">product + clearance</text>
        </g>
      )}
    </svg>
  );
}

// ─── Panel editor (flat dieline) ─────────────────────────────────────────────
function bestWForGlueTarget(targetG,Wmax=800){
  const t=Math.round(Number(targetG));
  if(!Number.isFinite(t)||t<28)return null;
  let best=50,bd=1e9;
  for(let W=50;W<=Wmax;W++){
    const d=Math.abs(glueTW(W)-t);
    if(d<bd){bd=d;best=W;}
  }
  return best;
}

function getSlottedPanelDefs(L,W,H,style){
  const flapCfg=FEFCO[style]?.flaps?.(W)||FEFCO["0201"].flaps(W);
  const geo=calcSlotted(L,W,H,flapCfg);
  const{topH,btmH,tMj,tMn,bMj,bMn,xs}=geo;
  const[x0,x1,x2,x3,x4,x5]=xs;
  const y1=btmH,y2=btmH+H;
  const defs=[
    {id:"glue",x:x0,y:y1,w:x1-x0,h:y2-y1},
    {id:"bW1",x:x1,y:y1,w:x2-x1,h:y2-y1},
    {id:"bL1",x:x2,y:y1,w:x3-x2,h:y2-y1},
    {id:"bW2",x:x3,y:y1,w:x4-x3,h:y2-y1},
    {id:"bL2",x:x4,y:y1,w:x5-x4,h:y2-y1},
  ];
  if(btmH>0)defs.push(
    {id:"bfW1",x:x1,y:y1-bMn,w:x2-x1,h:bMn},{id:"bfL1",x:x2,y:y1-bMj,w:x3-x2,h:bMj},
    {id:"bfW2",x:x3,y:y1-bMn,w:x4-x3,h:bMn},{id:"bfL2",x:x4,y:y1-bMj,w:x5-x4,h:bMj},
  );
  if(topH>0)defs.push(
    {id:"tfW1",x:x1,y:y2,w:x2-x1,h:tMn},{id:"tfL1",x:x2,y:y2,w:x3-x2,h:tMj},
    {id:"tfW2",x:x3,y:y2,w:x4-x3,h:tMn},{id:"tfL2",x:x4,y:y2,w:x5-x4,h:tMj},
  );
  return defs;
}

const approxArc=(cx,cy,r,a0,a1,steps=10)=>Array.from({length:steps},(_,i)=>{const t0=i/steps,t1=(i+1)/steps,p0=a0+(a1-a0)*t0,p1=a0+(a1-a0)*t1;return[cx+r*Math.cos(p0),cy+r*Math.sin(p0),cx+r*Math.cos(p1),cy+r*Math.sin(p1)];});
const approxCircle=(cx,cy,r,steps=16)=>approxArc(cx,cy,r,0,Math.PI*2,steps);

function buildFeatureGeometry(featureType,panel,opts){
  const top=clamp(Number(opts.top)||15,2,Math.max(2,panel.h-2));
  const xPct=clamp(Number(opts.xPct)||50,0,100);
  const cx=panel.x+panel.w*(xPct/100),yTop=panel.y+top;
  if(featureType==="euro_hang"){
    const slotW=clamp(Number(opts.slotW)||32,8,Math.max(8,panel.w-6));
    const slotH=clamp(Number(opts.slotH)||7,3,Math.max(3,panel.h-6));
    const r=slotH/2,x0=cx-slotW/2,x1=cx+slotW/2,y0=yTop-slotH/2,y1=yTop+slotH/2;
    const holeR=clamp(Number(opts.holeR)||3,2,8),holeCy=y0-(holeR+2);
    return{
      path:`M ${x0+r} ${y0} L ${x1-r} ${y0} A ${r} ${r} 0 0 1 ${x1-r} ${y1} L ${x0+r} ${y1} A ${r} ${r} 0 0 1 ${x0+r} ${y0} Z M ${cx+holeR} ${holeCy} A ${holeR} ${holeR} 0 1 0 ${cx-holeR} ${holeCy} A ${holeR} ${holeR} 0 1 0 ${cx+holeR} ${holeCy} Z`,
      kind:"cut",
      cuts:[...approxArc(x1-r,(y0+y1)/2,r,-Math.PI/2,Math.PI/2,8),[x1-r,y1,x0+r,y1],...approxArc(x0+r,(y0+y1)/2,r,Math.PI/2,Math.PI*1.5,8),[x0+r,y0,x1-r,y0],...approxCircle(cx,holeCy,holeR)],
      creases:[],
    };
  }
  if(featureType==="thumb_cut"){
    const r=clamp(Number(opts.radius)||20,5,Math.max(5,Math.min(panel.w*.45,panel.h*.45)));
    const cy=panel.y+r;
    return{path:`M ${cx-r} ${cy} A ${r} ${r} 0 0 0 ${cx+r} ${cy}`,kind:"cut",cuts:approxArc(cx,cy,r,Math.PI,0,12),creases:[]};
  }
  if(featureType==="tear_perf"){
    const inset=clamp(Number(opts.inset)||6,0,Math.max(0,panel.w/4)),x0=panel.x+inset,x1=panel.x+panel.w-inset,y=yTop;
    return{path:`M ${x0} ${y} L ${x1} ${y}`,kind:"crease",cuts:[],creases:[[x0,y,x1,y]]};
  }
  if(featureType==="window_cut"){
    const ww=clamp(Number(opts.ww)||40,6,Math.max(6,panel.w-6)),hh=clamp(Number(opts.hh)||30,6,Math.max(6,panel.h-6));
    const x0=cx-ww/2,y0=yTop-hh/2;
    return{path:`M ${x0} ${y0} L ${x0+ww} ${y0} L ${x0+ww} ${y0+hh} L ${x0} ${y0+hh} Z`,kind:"cut",cuts:[[x0,y0,x0+ww,y0],[x0+ww,y0,x0+ww,y0+hh],[x0+ww,y0+hh,x0,y0+hh],[x0,y0+hh,x0,y0]],creases:[]};
  }
  if(featureType==="lock_tab"){
    const tw=clamp(Number(opts.tabW)||24,8,Math.max(8,panel.w-4)),td=clamp(Number(opts.tabD)||12,4,Math.max(4,panel.h*.6));
    const x0=cx-tw/2,x1=cx+tw/2,yt=panel.y;
    return{path:`M ${x0} ${yt} L ${cx} ${yt-td} L ${x1} ${yt}`,kind:"cut",cuts:[[x0,yt,cx,yt-td],[cx,yt-td,x1,yt]],creases:[]};
  }
  return null;
}

function suggestFeaturePlacement(featureType, productBBox, productClearance, panelId, L, W, H){
  if(!productBBox||!productClearance)return null;
  if(featureType==="euro_hang"){
    const y=15;
    return{
      x:L/2,y,width:32,height:7,
      reasoning:`Centred on front panel, 15mm from top edge. Product clears hang hole by ${Math.round(H-productBBox.H-productClearance.top-y)}mm.`,
    };
  }
  if(featureType==="thumb_cut"){
    const shoulderHeight=productBBox.H*0.75;
    const fromTop=H-shoulderHeight-productClearance.top;
    return{
      x:L/2,y:Math.max(10,fromTop),radius:Math.min(25,W*0.15),
      reasoning:`Positioned at product shoulder height (${Math.round(shoulderHeight)}mm from base).`,
    };
  }
  if(featureType==="window_cut"){
    const winW=Math.round((productBBox.L*0.65)/5)*5;
    const winH=Math.round((productBBox.H*0.55)/5)*5;
    return{
      x:L/2-winW/2,y:H/2-winH/2,width:winW,height:winH,
      reasoning:`Window sized to show ${Math.round(winW)}x${Math.round(winH)}mm of product face.`,
    };
  }
  if(featureType==="tear_perf"){
    const tearY=H-(productBBox.H*0.8)-productClearance.top;
    return{
      y:Math.max(20,tearY),
      reasoning:`Tear line at product shoulder (${Math.round(productBBox.H*0.8)}mm from base).`,
    };
  }
  if(featureType==="lock_tab"){
    const volume=(productBBox.L*productBBox.W*productBBox.H)/1000;
    const isHeavy=volume>500;
    return{
      panel:isHeavy?"bottom-major":"top-tuck",
      reasoning:isHeavy?`Product volume ~${Math.round(volume)}cm3 - bottom lock tabs recommended for base integrity.`:`Light product - top tuck lock tab is sufficient.`,
    };
  }
  return null;
}
