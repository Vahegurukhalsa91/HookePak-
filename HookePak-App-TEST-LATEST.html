function DesignTab({L,W,H,lidH,style,setStyle,board,sel,setSel,setBoard,setLidH,setL,setW,setH,prompt,setPrompt,loading,setLoading,boardThicknessMm=4,productGeometry=null,productBBox=null,productClearance={top:10,bottom:10,left:8,right:8,front:8,back:8},productOrientation="upright",collisionCount=-1,onCollisionUpdate=null}){
  const[subTab,setSubTab]=useState("flat");
  const[showStyles,setShowStyles]=useState(false);
  const[copied,setCopied]=useState(false);
  const[showDXF,setShowDXF]=useState(false);
  const[dxfTxt,setDxfTxt]=useState("");
  const[err,setErr]=useState("");
  const[panelCentroids,setPanelCentroids]=useState([]);
  const[inspectorDraft,setInspectorDraft]=useState("");
  const[panelLocks,setPanelLocks]=useState({});
  const[toast,setToast]=useState(null);
  const[placedFeatures,setPlacedFeatures]=useState([]);
  const[featureDraft,setFeatureDraft]=useState(null);
  const toastTimerRef=useRef(null);

  const sInfo=FEFCO[style];
  const flapCfg=sInfo?.flaps?.(W);
  const geo=flapCfg?calcSlotted(L,W,H,flapCfg):null;
  const trayGeo=style==="0300"?calcTray(L,W,H):null;
  const{blankW=0,blankH=0,g:glue=0,topH=0,btmH=0}=geo||{};
  const effBlankW=geo?.blankW??trayGeo?.blankW??0;
  const effBlankH=geo?.blankH??trayGeo?.blankH??0;
  const blankAreaMm2=effBlankW*effBlankH;
  const blankAreaCm2=blankAreaMm2/100;

  const selCtrl={bW1:"W",bW2:"W",glue:"W",bfW1:"W",bfW2:"W",bfL1:"W",bfL2:"W",tfW1:"W",tfW2:"W",tfL1:"W",tfL2:"W",bL1:"L",bL2:"L",base:"L",front:"H",back:"H",left:"W",right:"W"}[sel];

  const onCentroids=useCallback(list=>{setPanelCentroids(Array.isArray(list)?list:[]);},[]);

  const panelMeta=sel?getPanelEditorMeta(sel,style,L,W,H):null;
  const centroid=sel&&panelCentroids.length?panelCentroids.find(c=>c.id===sel):null;
  const slottedPanelDefs=useMemo(()=>getSlottedPanelDefs(L,W,H,style),[L,W,H,style]);
  const panelMap=useMemo(()=>Object.fromEntries(slottedPanelDefs.map(p=>[p.id,p])),[slottedPanelDefs]);
  const draftPreview=useMemo(()=>{
    if(!featureDraft?.panelId)return null;
    const panel=panelMap[featureDraft.panelId];
    if(!panel)return null;
    const g=buildFeatureGeometry(featureDraft.feature.id,panel,featureDraft);
    if(!g)return null;
    return{id:"preview",featureType:featureDraft.feature.id,panelId:featureDraft.panelId,svgPath:g.path,kind:g.kind,dxfCuts:g.cuts,dxfCreases:g.creases,preview:true};
  },[featureDraft,panelMap]);

  useEffect(()=>{
    if(!panelMeta){setInspectorDraft("");return;}
    setInspectorDraft(String(panelMeta.inputValue));
  },[sel,style,L,W,H,panelMeta?.inputValue]);

  useEffect(()=>{
    Object.values(panelLocks).forEach(rec=>{
      if(!rec||typeof rec!=="object"||!rec.editKey)return;
      if(rec.editKey==="L"&&L!==rec.snapL)setL(rec.snapL);
      if(rec.editKey==="W"&&W!==rec.snapW)setW(rec.snapW);
      if(rec.editKey==="H"&&H!==rec.snapH)setH(rec.snapH);
      if(rec.editKey==="glue"&&W!==rec.snapW)setW(rec.snapW);
    });
  },[L,W,H,panelLocks,setL,setW,setH]);

  const showToast=msg=>{
    if(toastTimerRef.current)clearTimeout(toastTimerRef.current);
    setToast(msg);
    toastTimerRef.current=setTimeout(()=>{setToast(null);toastTimerRef.current=null;},4500);
  };

  const freezeKeyForEdit=k=>(k==="glue"?"W":k);

  const togglePanelLock=()=>{
    if(!sel||!panelMeta)return;
    setPanelLocks(p=>{
      if(p[sel]){const n={...p};delete n[sel];return n;}
      return{...p,[sel]:{editKey:panelMeta.editKey,snapL:L,snapW:W,snapH:H}};
    });
  };

  const applyInspector=()=>{
    if(!sel||!panelMeta||panelLocks[sel])return;
    const v=parseInt(String(inspectorDraft).trim(),10);
    if(!Number.isFinite(v))return;
    const flapBefore=sInfo?.flaps?.(W);
    const geoBeforeSlotted=flapBefore?calcSlotted(L,W,H,flapBefore):null;
    const geoBeforeTray=style==="0300"?calcTray(L,W,H):null;
    const bw0=geoBeforeSlotted?.blankW??geoBeforeTray?.blankW??0,bh0=geoBeforeSlotted?.blankH??geoBeforeTray?.blankH??0;
    let newL=L,newW=W,newH=H;
    let label="",oldVal,newVal;
    if(panelMeta.editKey==="glue"){
      const nw=bestWForGlueTarget(v);
      if(nw==null)return;
      oldVal=W;newVal=nw;newW=Math.min(nw,L);
      label=`Width (glue) updated: ${oldVal} -> ${newVal}mm`;
      setW(newW);
    }else if(panelMeta.editKey==="L"){
      oldVal=L;newVal=clamp(v,80,800);newL=newVal;newW=Math.min(W,newL);
      label=`Length updated: ${oldVal} -> ${newVal}mm`;
      setL(newL);if(newW!==W)setW(newW);
    }else if(panelMeta.editKey==="W"){
      oldVal=W;newVal=clamp(v,50,600);newW=newVal;newL=Math.max(L,newW);
      label=`Width updated: ${oldVal} -> ${newVal}mm`;
      setW(newW);if(newL!==L)setL(newL);
    }else if(panelMeta.editKey==="H"){
      oldVal=H;newVal=clamp(v,30,600);newH=newVal;
      label=`Height updated: ${oldVal} -> ${newVal}mm`;
      setH(newH);
    }
    const lA=panelMeta.editKey==="L"?newL:L,wA=panelMeta.editKey==="W"||panelMeta.editKey==="glue"?newW:W,hA=panelMeta.editKey==="H"?newH:H;
    let bw1=bw0,bh1=bh0;
    if(style==="0300"){const gt=calcTray(lA,wA,hA);bw1=gt.blankW;bh1=gt.blankH;}
    else{const fa=sInfo?.flaps?.(wA);if(fa){const ga=calcSlotted(lA,wA,hA,fa);bw1=ga.blankW;bh1=ga.blankH;}}
    if(bw0||bh0)showToast(`${label}. Blank: ${bw0}x${bh0}mm -> ${bw1}x${bh1}mm`);
    else showToast(label);
    setPanelLocks(p=>{
      const n={...p};
      let ch=false;
      for(const id of Object.keys(n)){
        const r=n[id];
        if(!r||typeof r!=="object")continue;
        if(panelMeta.editKey==="L"&&r.editKey==="L"){n[id]={...r,snapL:newL};ch=true;}
        if((panelMeta.editKey==="W"||panelMeta.editKey==="glue")&&(r.editKey==="W"||r.editKey==="glue")){n[id]={...r,snapW:newW};ch=true;}
        if(panelMeta.editKey==="H"&&r.editKey==="H"){n[id]={...r,snapH:newH};ch=true;}
      }
      return ch?n:p;
    });
  };

  const driverColor={L:T.purple,W:T.green,H:T.blue}[freezeKeyForEdit(panelMeta?.editKey||"L")]||T.purple;

  const handleExportDXF=()=>{
    let txt="";
    if(style==="0300")txt=genDXFTray(L,W,H);
    else if(geo){
      const fxCuts=placedFeatures.flatMap(f=>f.dxfCuts||[]);
      const fxCreases=placedFeatures.flatMap(f=>f.dxfCreases||[]);
      txt=genDXFSlotted(L,W,H,geo,fxCuts,fxCreases);
    }
    if(!txt)return;
    setDxfTxt(txt);
    const fname=`FEFCO_${style}_${L}x${W}x${H}mm.dxf`;
    try{downloadDXF(txt,fname);setCopied(true);setTimeout(()=>setCopied(false),2500);}
    catch{setShowDXF(true);}
  };

  const parseAI=async()=>{
    if(!prompt.trim())return;
    setLoading(true);setErr("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,
          system:`Packaging engineer. Return ONLY JSON: {"L":number,"W":number,"H":number}. L>=W. Integers in mm.`,
          messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const txt=(data.content?.find(b=>b.type==="text")?.text||"").trim();
      const p=JSON.parse(txt);
      // We can't setL/W/H here as they come from parent — signal via a callback
      // Instead we show the values and user can manually adjust
      setErr(`Parsed: L=${p.L} W=${p.W} H=${p.H} mm - adjust sliders above`);
    }catch{setErr("Try: '380 x 260 x 200mm B-flute'");}
    setLoading(false);
  };

  const SUBTABS=[["3d","3D"],["flat","Flat / DXF"],["ai","AI"]];

  return(
    <div>
      {/* Style header */}
      <div style={{padding:"6px 14px",background:T.purpleLight,borderBottom:`1px solid ${T.purpleMid}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:T.purple,fontWeight:"600"}}>{sInfo?.name}</div>
          <div style={{fontSize:9,color:T.textMid}}>{sInfo?.desc}</div>
        </div>
        <button onClick={()=>setShowStyles(v=>!v)} style={{background:showStyles?T.purple:T.purpleLight,border:`1px solid ${showStyles?T.purple:T.purpleMid}`,color:showStyles?"white":T.purple,padding:"5px 10px",borderRadius:8,fontSize:10,fontWeight:"600",cursor:"pointer"}}>
          {style} {showStyles?"▲":"▼"}
        </button>
      </div>
      {showStyles&&<StyleSelector current={style} onChange={id=>{ setStyle(id); setSel(null); setShowStyles(false); }}/>}

      {/* Sub-tabs */}
      <div style={{display:"flex",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
        {SUBTABS.map(([id,lbl])=>(<button key={id} onClick={()=>setSubTab(id)} style={{flex:1,padding:"8px 4px",background:"none",border:"none",borderBottom:`2px solid ${subTab===id?T.purple:"transparent"}`,color:subTab===id?T.purple:T.textMid,fontSize:10,fontWeight:subTab===id?"700":"400",cursor:"pointer"}}>{lbl}</button>))}
      </div>
      <div style={{padding:"8px 14px",background:T.purpleLight,borderBottom:`1px solid ${T.purpleMid}`,fontSize:10,color:T.purple,lineHeight:1.45}}>
        {subTab==="flat"
          ?<><strong>Panel editor</strong> - click any panel or flap on the dieline. Use the floating card to change dimensions (stays in sync with the L/W/H sliders). Constraint summary is under the drawing.</>
          :<><strong>3D view</strong> - switch to <button type="button" onClick={()=>setSubTab("flat")} style={{background:T.purple,color:"white",border:"none",padding:"2px 10px",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer"}}>Flat / DXF</button> for the 2D dieline, panel inspector, DXF export, and constraints.</>}
      </div>

      {subTab==="3d"&&<div style={{background:T.surface,borderBottom:`1px solid ${T.border}`}}>
        <Box3D L={L} W={W} H={H} style={style} lidH={lidH} boardThickness={boardThicknessMm} productGeometry={productGeometry} productBBox={productBBox} productClearance={productClearance} productOrientation={productOrientation} onCollisionUpdate={onCollisionUpdate}/>
        {productBBox&&collisionCount>=0&&(
          <div style={{margin:"8px 14px 12px",padding:"8px 10px",borderRadius:8,fontSize:10,fontWeight:600,background:collisionCount>0?"#FEE2E2":"#DCFCE7",border:`1px solid ${collisionCount>0?"#FCA5A5":"#86EFAC"}`,color:collisionCount>0?"#991B1B":"#166534"}}>
            {collisionCount>0?`Warning: ${collisionCount} panel(s) intersect the product. Increase clearance or adjust H/W/L.`:"OK: No interference - product fits cleanly"}
          </div>
        )}
      </div>}

      {subTab==="flat"&&(
        <>
          <div style={{padding:"6px 14px",background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{fontSize:8,color:T.textMid,fontWeight:"600",letterSpacing:1}}>ARTIOS LAYERS</div>
            {[{color:AC.CUT,dash:false,lbl:"Cut"},{color:AC.CREASE,dash:true,lbl:"Crease"}].map(({color,dash,lbl})=>(<div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}><svg width={18} height={6}><line x1={0} y1={3} x2={18} y2={3} stroke={color} strokeWidth={1.6} strokeDasharray={dash?"5 3":"none"}/></svg><span style={{fontSize:9,color:T.textMid}}>{lbl}</span></div>))}
            <button onClick={handleExportDXF} style={{marginLeft:"auto",background:copied?T.green:T.purple,border:"none",color:"white",padding:"5px 12px",borderRadius:7,fontSize:10,fontWeight:"700",cursor:"pointer",transition:"background .3s"}}>{copied?"Exported!":"Export DXF"}</button>
          </div>
          {copied&&(<div style={{margin:"6px 14px",padding:"7px 12px",background:"#F0FDF4",border:`1px solid ${T.green}44`,borderRadius:7,fontSize:10,color:T.green,display:"flex",justifyContent:"space-between"}}>
            <span>Paste into text editor, save as .dxf</span>
            <button onClick={()=>setShowDXF(v=>!v)} style={{background:"none",border:`1px solid ${T.green}`,color:T.green,padding:"2px 8px",borderRadius:5,fontSize:9,cursor:"pointer"}}>{showDXF?"Hide":"Show"}</button>
          </div>)}
          {showDXF&&dxfTxt&&(<div style={{margin:"0 14px 6px",padding:"6px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:7}}><textarea readOnly value={dxfTxt} onFocus={e=>e.target.select()} style={{width:"100%",height:100,background:T.bg,border:`1px solid ${T.border}`,color:T.text,fontSize:8,fontFamily:"monospace",padding:5,resize:"none",outline:"none",borderRadius:5}}/></div>)}
          <div style={{position:"relative",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
            {sInfo?.r==="slotted"&&<DieCutSlotted L={L} W={W} H={H} style={style} selected={sel} onSelect={setSel} onPanelCentroids={onCentroids} featurePaths={[...placedFeatures,(draftPreview||null)].filter(Boolean)} eligiblePanelIds={featureDraft?slottedPanelDefs.map(p=>p.id):[]} productBBox={productBBox} productClearance={productClearance}/>}
            {style==="0300"&&<DieCutTray L={L} W={W} H={H} selected={sel} onSelect={setSel} onPanelCentroids={onCentroids}/>}
            {sInfo?.r==="soon"&&<div style={{height:140,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:T.textLight}}><div style={{fontSize:20}}>Tool</div><div style={{fontSize:11}}>{sInfo.name} - coming soon</div></div>}
            {sel&&panelMeta&&centroid&&(
              <div style={{
                position:"absolute",zIndex:4,
                left:`min(88%, max(12%, ${centroid.cx*100}%))`,
                top:`min(82%, max(8%, ${centroid.cy*100}%))`,
                transform:"translate(-50%, calc(-100% - 10px))",
                width:220,maxWidth:"92%",
                background:T.surface,border:`1px solid ${T.border}`,borderLeft:`4px solid ${driverColor}`,
                borderRadius:10,boxShadow:"0 8px 24px rgba(26,25,23,.12)",
                padding:"10px 12px",fontSize:12,fontFamily:"ui-monospace,monospace",
              }}>
                <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1}}>{panelMeta.type.replace(/^\w/,c=>c.toUpperCase())} | {style}</div>
                <div style={{fontWeight:700,color:T.text,marginTop:2}}>{panelMeta.name}</div>
                <div style={{fontSize:11,color:T.textMid,marginTop:4}}>{panelMeta.wMm} x {panelMeta.hMm} mm</div>
                <div style={{fontSize:10,color:driverColor,marginTop:6}}>Controlled by: {panelMeta.driverLabel}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,flexWrap:"wrap"}}>
                  <input type="number" min={1} value={inspectorDraft} disabled={!!panelLocks[sel]} onChange={e=>setInspectorDraft(e.target.value)}
                    style={{width:88,padding:"6px 8px",borderRadius:6,border:`1px solid ${T.border}`,fontSize:12,fontFamily:"inherit",opacity:panelLocks[sel]?0.55:1}}/>
                  <span style={{fontSize:10,color:T.textLight}}>mm</span>
                  <button type="button" onClick={applyInspector} disabled={!!panelLocks[sel]} style={{
                    padding:"6px 12px",borderRadius:6,border:"none",background:panelLocks[sel]?T.border:T.purple,color:"white",fontSize:10,fontWeight:700,cursor:panelLocks[sel]?"not-allowed":"pointer"}}>Apply</button>
                </div>
                <label style={{display:"flex",alignItems:"center",gap:6,marginTop:8,fontSize:10,color:T.textMid,cursor:"pointer"}}>
                  <input type="checkbox" checked={!!panelLocks[sel]} onChange={togglePanelLock}/>
                  Lock - freeze driving dimension vs sliders
                </label>
                <button type="button" onClick={()=>setSel(null)} style={{marginTop:8,width:"100%",padding:"6px",borderRadius:6,border:`1px solid ${T.border}`,background:T.bg,fontSize:10,cursor:"pointer"}}>Deselect</button>
              </div>
            )}
          </div>
          {(geo||trayGeo)&&(
            <div style={{margin:"10px 14px 12px",padding:"12px 14px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:10}}>
              <div style={{fontSize:9,color:T.textLight,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Constraint summary</div>
              <div style={{display:"grid",gap:8,fontSize:11,fontFamily:"ui-monospace,monospace"}}>
                <div><span style={{color:T.purple,fontWeight:700}}>L</span> {L} mm <span style={{color:T.textLight}}>- length faces, major flaps (L span)</span></div>
                <div><span style={{color:T.green,fontWeight:700}}>W</span> {W} mm <span style={{color:T.textLight}}>- width faces, minor flaps, glue from W</span></div>
                <div><span style={{color:T.blue,fontWeight:700}}>H</span> {H} mm <span style={{color:T.textLight}}>- panel height (erect carton)</span></div>
                {geo&&<div style={{fontSize:10,color:T.textMid}}>Glue tab: {glue} mm <span style={{color:T.textLight}}>(auto max(28, round(W*0.12)))</span></div>}
                <div style={{fontSize:10,color:T.text}}>Blank: <strong>{effBlankW} x {effBlankH} mm</strong></div>
                <div style={{fontSize:10,color:T.text}}>Area: <strong>{Math.round(blankAreaMm2).toLocaleString()} mm²</strong> = {round1(blankAreaCm2)} cm²</div>
                <div style={{fontSize:9,color:T.textLight}}>Board: {board}</div>
              </div>
            </div>
          )}
          {sInfo?.r==="slotted"&&(
            <>
              <DieFeatureLibrary onPick={f=>{
                if(!f.implemented){showToast("Coming soon");return;}
                setFeatureDraft({feature:f,panelId:sel||null,top:15,xPct:50,radius:20,ww:40,hh:30,tabW:24,tabD:12,slotW:32,slotH:7,holeR:3,inset:6});
              }}/>
              {placedFeatures.length>0&&<div style={{margin:"0 14px 12px",padding:"8px 10px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:8}}>
                <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Placed features</div>
                <div style={{display:"grid",gap:4}}>
                  {placedFeatures.map(f=>(
                    <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10,fontFamily:"monospace"}}>
                      <span>{(FEATURE_LIBRARY.find(x=>x.id===f.featureType)?.name||f.featureType)} on {f.panelId}</span>
                      <button onClick={()=>setPlacedFeatures(prev=>prev.filter(x=>x.id!==f.id))} style={{border:`1px solid ${T.border}`,background:"white",borderRadius:6,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>Remove</button>
                    </div>
                  ))}
                </div>
              </div>}
            </>
          )}
          {geo&&(<div style={{margin:"0 14px 12px",padding:"10px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:10,fontFamily:"monospace"}}>
            {[["Top flap",`${topH}mm`,T.textMid],["Btm flap",`${btmH}mm`,T.textMid]].map(([k,v,c])=>(<div key={k}><div style={{fontSize:8,color:T.textLight}}>{k}</div><div style={{color:c,marginTop:1}}>{v}</div></div>))}
          </div>)}
        </>
      )}

      {subTab==="ai"&&(
        <div style={{padding:14,background:T.surface,borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:11,color:T.textMid,marginBottom:8}}>Describe your box</div>
          <div style={{display:"flex",gap:8}}>
            <input value={prompt} onChange={e=>setPrompt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&parseAI()} placeholder="e.g. 380x260x200mm B-flute RSC" style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,color:T.text,padding:"8px 12px",fontSize:12,fontFamily:"monospace",outline:"none",borderRadius:8,WebkitAppearance:"none"}}/>
            <button onClick={parseAI} disabled={loading} style={{background:loading?T.border:T.purple,border:"none",color:"white",padding:"8px 14px",borderRadius:8,fontSize:11,fontWeight:"700",cursor:loading?"not-allowed":"pointer"}}>{loading?"...":"Go"}</button>
          </div>
          {err&&<div style={{fontSize:10,marginTop:6,color:err.startsWith("Parsed")?T.green:"#DC2626"}}>{err}</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
            {["330x330x40mm pizza","200x150x100mm mailer","600x400x300mm export"].map(ex=>(<button key={ex} onClick={()=>setPrompt(ex)} style={{background:T.bg,border:`1px solid ${T.border}`,color:T.textMid,padding:"4px 8px",fontSize:9,fontFamily:"monospace",cursor:"pointer",borderRadius:6}}>{ex}</button>))}
          </div>
        </div>
      )}
      {toast&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:10000,maxWidth:"min(560px,92vw)",padding:"10px 16px",background:T.text,color:T.surface,borderRadius:10,fontSize:12,fontFamily:"ui-monospace,monospace",boxShadow:"0 10px 40px rgba(0,0,0,.2)"}}>
          {toast}
        </div>
      )}
      {featureDraft&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.25)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10001}}>
          <div style={{width:420,maxWidth:"92vw",background:"white",border:`1px solid ${T.border}`,borderRadius:10,padding:12}}>
            <div style={{fontSize:12,fontWeight:700,color:T.text}}>Place feature | {featureDraft.feature.name}</div>
            <div style={{fontSize:9,color:T.textLight,marginTop:3}}>Select which panel to place this on</div>
            <select value={featureDraft.panelId||""} onChange={e=>setFeatureDraft(v=>({...v,panelId:e.target.value||null}))} style={{marginTop:8,width:"100%",padding:"7px 8px",border:`1px solid ${T.border}`,borderRadius:7,fontSize:11}}>
              <option value="">Select panel</option>
              {slottedPanelDefs.map(p=><option key={p.id} value={p.id}>{p.id}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
              <label style={{fontSize:9,color:T.textMid}}>Distance from top edge (mm)<input type="number" value={featureDraft.top} min={0} onChange={e=>setFeatureDraft(v=>({...v,top:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
              <label style={{fontSize:9,color:T.textMid}}>Custom X (%)<input type="number" value={featureDraft.xPct} min={0} max={100} onChange={e=>setFeatureDraft(v=>({...v,xPct:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
            </div>
            {productBBox&&featureDraft.panelId&&(
              <div style={{marginTop:8,padding:"8px 9px",border:`1px solid ${T.purpleMid}`,background:T.purpleLight,borderRadius:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                  <div style={{fontSize:10,color:T.purple,fontWeight:700}}>* Smart suggestion based on product geometry</div>
                  <button onClick={()=>{
                    const panel=panelMap[featureDraft.panelId];if(!panel)return;
                    const s=suggestFeaturePlacement(featureDraft.feature.id,productBBox,productClearance,featureDraft.panelId,L,W,H);
                    if(!s)return;
                    setFeatureDraft(v=>{
                      let n={...v};
                      if(Number.isFinite(s.y))n.top=round1(s.y);
                      if(Number.isFinite(s.radius))n.radius=round1(s.radius);
                      if(Number.isFinite(s.width)&&Number.isFinite(panel?.w))n.ww=round1(s.width);
                      if(Number.isFinite(s.height))n.hh=round1(s.height);
                      if(Number.isFinite(s.x)&&Number.isFinite(panel?.w)){
                        const cx=Number.isFinite(s.width)?(s.x+(s.width/2)):s.x;
                        n.xPct=clamp((cx/panel.w)*100,0,100);
                      }
                      if(typeof s.panel==="string"&&slottedPanelDefs.some(p=>p.id===s.panel))n.panelId=s.panel;
                      n.suggestionReason=s.reasoning||"";
                      return n;
                    });
                  }} style={{border:`1px solid ${T.purple}`,background:"white",color:T.purple,padding:"4px 8px",borderRadius:6,fontSize:9,fontWeight:700,cursor:"pointer"}}>Apply suggestion</button>
                </div>
                {(()=>{
                  const s=suggestFeaturePlacement(featureDraft.feature.id,productBBox,productClearance,featureDraft.panelId,L,W,H);
                  return s?.reasoning?<div style={{marginTop:6,fontSize:9,color:T.textMid,fontStyle:"italic"}}>{s.reasoning}</div>:null;
                })()}
              </div>
            )}
            {featureDraft.feature.id==="thumb_cut"&&<label style={{display:"block",fontSize:9,color:T.textMid,marginTop:8}}>Radius (mm)<input type="number" value={featureDraft.radius} min={5} onChange={e=>setFeatureDraft(v=>({...v,radius:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>}
            {featureDraft.feature.id==="window_cut"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <label style={{fontSize:9,color:T.textMid}}>Window W<input type="number" value={featureDraft.ww} onChange={e=>setFeatureDraft(v=>({...v,ww:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
              <label style={{fontSize:9,color:T.textMid}}>Window H<input type="number" value={featureDraft.hh} onChange={e=>setFeatureDraft(v=>({...v,hh:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
            </div>}
            {featureDraft.feature.id==="lock_tab"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <label style={{fontSize:9,color:T.textMid}}>Tab W<input type="number" value={featureDraft.tabW} onChange={e=>setFeatureDraft(v=>({...v,tabW:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
              <label style={{fontSize:9,color:T.textMid}}>Tab depth<input type="number" value={featureDraft.tabD} onChange={e=>setFeatureDraft(v=>({...v,tabD:Number(e.target.value)}))} style={{marginTop:3,width:"100%",padding:"6px",border:`1px solid ${T.border}`,borderRadius:6}}/></label>
            </div>}
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}>
              <button onClick={()=>setFeatureDraft(null)} style={{border:`1px solid ${T.border}`,background:"white",borderRadius:7,padding:"6px 10px",fontSize:10,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{
                if(!featureDraft.panelId){showToast("Select a panel");return;}
                const panel=panelMap[featureDraft.panelId];if(!panel){showToast("Invalid panel");return;}
                const g=buildFeatureGeometry(featureDraft.feature.id,panel,featureDraft);if(!g){showToast("Feature not implemented");return;}
                setPlacedFeatures(prev=>[...prev,{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),featureType:featureDraft.feature.id,panelId:featureDraft.panelId,position:{top:featureDraft.top,xPct:featureDraft.xPct},size:{...featureDraft},svgPath:g.path,kind:g.kind,dxfCuts:g.cuts,dxfCreases:g.creases}]);
                setFeatureDraft(null);
              }} style={{border:"none",background:T.purple,color:"white",borderRadius:7,padding:"6px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Place</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Pack tab ─────────────────────────────────────────────────────────────────
function PackTab({box,fillPatterns,bestFill}){
  const[productType,setProductType]=useState("box");
  const[pL,setPL]=useState(90);const[pW,setPW]=useState(60);const[pH,setPH]=useState(40);
  const[pDia,setPDia]=useState(50);const[gap,setGap]=useState(4);
  const[fillIdx,setFillIdx]=useState(0);

  const product=useMemo(()=>productType==="box"
    ?{type:"box",L:clamp(pL,1,10000),W:clamp(pW,1,10000),H:clamp(pH,1,10000),gap:clamp(gap,0,100)}
    :{type:"cylinder",diameter:clamp(pDia,1,10000),H:clamp(pH,1,10000),gap:clamp(gap,0,100)}
  ,[productType,pL,pW,pH,pDia,gap]);

  const fills=useMemo(()=>buildFillPatterns(box,product),[box,product]);
  const best=fills[0]||null;
  const current=fills[fillIdx]||null;

  return(
    <div style={{padding:14,display:"grid",gap:12}}>

function PalletReport({box,pallet,palletPattern,palletPreset,board,style}){
  const best=palletPattern;
  if(!best)return null;
  const cVol=round1((box.L*box.W*box.H)/1e6);
  const util=best.utilisation?round1(best.utilisation*100):0;
  const stackText=best.description?`${best.name} — ${best.description}`:best.name||"—";
  const rows=[
    ["Carton dimensions",`${box.L} x ${box.W} x ${box.H} mm`],
    ["Pallet standard",palletPreset],
    ["Pallet footprint",`${pallet.L} x ${pallet.W} mm`],
    ["Pallet max height",`${pallet.maxH} mm`],
    ["Stacking pattern",stackText],
    ["Pattern type",best.strategy||"—"],
    ["Compression efficiency",compressionLabel(best.strategy)],
    ["Cartons per layer",`${best.layerCount||0}`],
    ["Layers",`${best.maxLayers||0}`],
    ["Total cartons / pallet",`${best.totalCartons||0}`],
    ["Carton volume",`${cVol} L`],
    ["Cube utilisation",`${util}%`],
    ["FEFCO style",style],
    ["Board type",board],
  ];

  const ensureJsPdf=async()=>{
    if(window.jspdf?.jsPDF)return window.jspdf.jsPDF;
    try{
      const mod=await import("https://cdn.jsdelivr.net/npm/jspdf@2.5.1/+esm");
      if(mod?.jsPDF)return mod.jsPDF;
    }catch{}
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
    if(!window.jspdf?.jsPDF)throw new Error("jsPDF unavailable");
    return window.jspdf.jsPDF;
  };

  const exportPDF=async()=>{
    let jsPDF;
    try{
      jsPDF=await ensureJsPdf();
    }catch{
      alert("PDF export failed: could not load jsPDF library.");
      return;
    }
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pw=210,ph=297,ml=18,mr=18,mt=22;
    let y=mt;

    // Header bar
    doc.setFillColor(124,58,237);
    doc.rect(0,0,pw,18,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(13);doc.setFont("helvetica","bold");
    doc.text("HookePak — Pallet Optimisation Report",ml,12);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text(`Generated ${new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}`,pw-mr,12,{align:"right"});
    y=26;

    // KPI boxes
    const kpis=[
      ["CARTONS / PALLET",`${best.totalCartons||0}`,"7C3AED"],
      ["PER LAYER",`${best.layerCount||0}`,"059669"],
      ["CUBE EFFICIENCY",`${util}%`,util>75?"059669":util>50?"B45309":"DC2626"],
    ];
    const kw=(pw-ml-mr-8)/3;
    kpis.forEach(([label,val,hex],i)=>{
      const kx=ml+i*(kw+4);
      const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
      doc.setFillColor(r,g2,b);
      doc.setDrawColor(r,g2,b);
      doc.roundedRect(kx,y,kw,18,2,2,"FD");
      doc.setTextColor(255,255,255);
      doc.setFontSize(18);doc.setFont("helvetica","bold");
      doc.text(val,kx+kw/2,y+11,{align:"center"});
      doc.setFontSize(6);doc.setFont("helvetica","normal");
      doc.text(label,kx+kw/2,y+16,{align:"center"});
    });
    y+=24;

    // Section: Data table
    doc.setTextColor(100,90,80);
    doc.setFontSize(8);doc.setFont("helvetica","bold");
    doc.text("SPECIFICATION",ml,y);
    y+=4;
    doc.setDrawColor(229,227,221);
    doc.line(ml,y,pw-mr,y);
    y+=4;

    rows.forEach(([k,v],i)=>{
      const rowH=7;
      if(i%2===0){doc.setFillColor(249,248,246);doc.rect(ml,y-4,pw-ml-mr,rowH,"F");}
      doc.setTextColor(107,101,96);doc.setFontSize(8);doc.setFont("helvetica","normal");
      doc.text(k,ml+2,y);
      doc.setTextColor(26,25,23);doc.setFont("helvetica","bold");
      doc.text(v,pw-mr-2,y,{align:"right"});
      y+=rowH;
    });
    y+=4;
    doc.setDrawColor(229,227,221);doc.line(ml,y,pw-mr,y);
    y+=8;

    // Efficiency bar
    doc.setTextColor(100,90,80);doc.setFontSize(8);doc.setFont("helvetica","bold");
    doc.text("CUBE EFFICIENCY",ml,y);y+=5;
    const barW=pw-ml-mr,barH=5;
    doc.setFillColor(229,227,221);doc.roundedRect(ml,y,barW,barH,1,1,"F");
    const fillW=barW*(Math.min(util,100)/100);
    const fr=util>75?5:util>50?180:220,fg=util>75?150:util>50?120:50,fb=util>75?105:util>50?9:50;
    doc.setFillColor(fr,fg,fb);
    if(fillW>0)doc.roundedRect(ml,y,fillW,barH,1,1,"F");
    y+=barH+4;
    doc.setTextColor(107,101,96);doc.setFontSize(7);doc.setFont("helvetica","normal");
    const advice=util>75?"Excellent cube density — well optimised.":util>50?"Good. Consider adjusting carton or pallet size to improve.":"Low utilisation — review carton dimensions vs pallet footprint.";
    doc.text(advice,ml,y);
    y+=8;

    // Footer
    doc.setDrawColor(229,227,221);doc.line(ml,ph-14,pw-mr,ph-14);
    doc.setTextColor(168,162,158);doc.setFontSize(7);
    doc.text("HookePak by Hooke-X Technologies Ltd  |  hookepak.com",ml,ph-9);
    doc.text("Page 1 of 1",pw-mr,ph-9,{align:"right"});

    doc.save(`HookePak_Pallet_Report_${style}_${new Date().toISOString().slice(0,10)}.pdf`);
  };
  return(
    <div style={{padding:14,border:`1px solid ${T.border}`,borderRadius:12,background:T.surface}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:T.text}}>Pallet Optimisation Report</div>
          <div style={{fontSize:9,color:T.textMid}}>CapePak-style summary</div>
        </div>
        <button onClick={exportPDF} style={{border:"1px solid #7C3AED",background:"#EDE9FE",color:"#7C3AED",padding:"5px 12px",borderRadius:7,fontSize:9,cursor:"pointer",fontWeight:700}}>
          ⬇ Export PDF
        </button>
      </div>
      {/* Key metrics banner */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{padding:10,background:T.purpleLight,borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:800,color:T.purple}}>{best.totalCartons||0}</div>
          <div style={{fontSize:8,color:T.purple,marginTop:2}}>CARTONS / PALLET</div>
        </div>
        <div style={{padding:10,background:"#ECFDF5",borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:800,color:T.green}}>{best.layerCount||0}</div>
          <div style={{fontSize:8,color:T.green,marginTop:2}}>PER LAYER</div>
        </div>
        <div style={{padding:10,background:"#FFF7ED",borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:800,color:T.amber}}>{util}%</div>
          <div style={{fontSize:8,color:T.amber,marginTop:2}}>CUBE EFFICIENCY</div>
        </div>
      </div>
      {/* Data table */}
      <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${T.border}`}}>
        {rows.map(([k,v],i)=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:i%2===0?T.bg:T.surface,borderBottom:i<rows.length-1?`1px solid ${T.border}`:"none"}}>
            <span style={{fontSize:10,color:T.textMid}}>{k}</span>
            <span style={{fontSize:10,fontWeight:600,color:T.text,fontFamily:"monospace"}}>{v}</span>
          </div>
        ))}
      </div>
      {/* Efficiency bar */}
      <div style={{marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.textMid,marginBottom:4}}>
          <span>Cube utilisation</span><span style={{fontWeight:700,color:util>75?T.green:util>50?T.amber:"#DC2626"}}>{util}%</span>
        </div>
        <div style={{height:6,background:T.border,borderRadius:3}}>
          <div style={{height:6,width:`${Math.min(util,100)}%`,background:util>75?T.green:util>50?T.amber:"#DC2626",borderRadius:3,transition:"width .4s"}}/>
        </div>
        <div style={{fontSize:8,color:T.textLight,marginTop:4}}>
          {util>75?"Excellent — high cube density":""}
          {util>50&&util<=75?"Good — consider alternative dimensions":""}
          {util<=50?"Low utilisation — optimise carton or pallet size":""}
        </div>
      </div>
    </div>
  );
}

  const [aiClearances, setAiClearances] = useState(null);
  const [collisionCount, setCollisionCount] = useState(-1);
  const [autoApplyOrientation, setAutoApplyOrientation] = useState(true);
  const [productLoading,setProductLoading]=useState(false);
  const [productError,setProductError]=useState("");
  const [productSuggestion,setProductSuggestion]=useState(null);
  const [suggestLoading,setSuggestLoading]=useState(false);
  const [appToast,setAppToast]=useState("");
  const productInputRef=useRef(null);

  const box=useMemo(()=>({L:clamp(L,1,9999),W:clamp(W,1,9999),H:clamp(H,1,9999)}),[L,W,H]);

  const boardThicknessMm = useMemo(()=>{
    const map={"E-flute":1.5,"B-flute":3,"C-flute":4,"BC double":7,"Solid board":1};
    return map[board]??3;
  },[board]);

  const selCtrl={bW1:"W",bW2:"W",glue:"W",bfW1:"W",bfW2:"W",bfL1:"W",bfL2:"W",tfW1:"W",tfW2:"W",tfL1:"W",tfL2:"W",bL1:"L",bL2:"L",base:"L",front:"H",back:"H",left:"W",right:"W"}[sel];
  const shownBBox=useMemo(()=>applyUnit(productBBox,productUnit),[productBBox,productUnit]);
  const orientedBBox=useMemo(()=>{
    if(!shownBBox)return null;
    const {L:PL,W:PW,H:PH}=shownBBox;
    switch(productOrientation){
      case "side": return {L:PL,W:PH,H:PW};
      case "rotated": return {L:PW,W:PL,H:PH};
      default: return {L:PL,W:PW,H:PH};
    }
  },[shownBBox,productOrientation]);
  const productInnerDims=useMemo(()=>{
    if(!orientedBBox)return null;
    return{
      L:Math.round((orientedBBox.L+productClearance.left+productClearance.right)*10)/10,
      W:Math.round((orientedBBox.W+productClearance.front+productClearance.back)*10)/10,
      H:Math.round((orientedBBox.H+productClearance.top+productClearance.bottom)*10)/10,
    };
  },[orientedBBox,productClearance]);

  const handleProductFile=async(file)=>{
    if(!file)return;
    setProductLoading(true);setProductError("");setProductSuggestion(null);
    try{
      const parsed=await parseProductFile(file);
      setProductGeometry(parsed.geometry);
      setProductBBox(parsed.bbox);
      setProductFile({name:file.name,format:(file.name.split(".").pop()||"").toUpperCase(),sizeKB:Math.round(file.size/1024)});
      setProductUnit(parsed.detectedUnit||"mm");
      setProductOrientation("upright");
      setCollisionCount(-1);
      setSuggestLoading(true);
      const bboxMm=applyUnit(parsed.bbox,parsed.detectedUnit||"mm");
      try{
        const sug=await inferPackagingFromProduct(bboxMm,file.name,productClearance);
        setProductSuggestion(sug);
        if(sug?.innerL&&sug?.innerW&&sug?.innerH){
          const ai={
            left:Math.max(0,round1((sug.innerL-bboxMm.L)/2)),right:Math.max(0,round1((sug.innerL-bboxMm.L)/2)),
            front:Math.max(0,round1((sug.innerW-bboxMm.W)/2)),back:Math.max(0,round1((sug.innerW-bboxMm.W)/2)),
            top:Math.max(0,round1((sug.innerH-bboxMm.H)/2)),bottom:Math.max(0,round1((sug.innerH-bboxMm.H)/2)),
          };
          setAiClearances(ai);
          setProductClearance(ai);
        }
      }catch{
        setProductSuggestion(null);
        setAppToast("AI suggestion unavailable (network). Product import still loaded.");
      }
    }catch(e){
      setProductError(e?.message||"Parse failed");
    }finally{
      setSuggestLoading(false);
      setProductLoading(false);
    }
  };
  const applyProductInnerToCarton=()=>{
    if(!productInnerDims)return;
    setL(Math.round(productInnerDims.L/5)*5);
    setW(Math.round(productInnerDims.W/5)*5);
    setH(Math.round(productInnerDims.H/5)*5);
  };
  const clearProduct=()=>{
    setProductGeometry(null);setProductBBox(null);setProductFile(null);setProductOrientation("upright");
    setCollisionCount(-1);setProductSuggestion(null);setProductError("");setProductLoading(false);
    setProductClearance({top:10,bottom:10,left:8,right:8,front:8,back:8});setAiClearances(null);
  };
  const truncateName=n=>n?.length>20?`${n.slice(0,17)}...`:n;

  useEffect(()=>{
    if(productFile&&autoApplyOrientation)applyProductInnerToCarton();
  },[productOrientation,autoApplyOrientation,productFile,productInnerDims]);

  useEffect(()=>{
    if(!appToast)return;
    const t=setTimeout(()=>setAppToast(""),3000);
    return()=>clearTimeout(t);
  },[appToast]);

  const handleExport=async(data)=>{
    const txt=JSON.stringify(data,null,2);
    try{await navigator.clipboard.writeText(txt);}catch(e){console.log(txt);}
  };

  return(
    <div style={{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"system-ui,-apple-system,sans-serif",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:32,height:32,background:T.purpleLight,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width={16} height={16} viewBox="0 0 36 36">
            <rect x={2} y={10} width={32} height={18} fill="none" stroke={T.purple} strokeWidth={2.2}/>
            <rect x={6} y={2} width={10} height={9} fill="none" stroke={T.purple} strokeWidth={1.5} strokeDasharray="3 2"/>
            <rect x={20} y={2} width={10} height={9} fill="none" stroke={T.purple} strokeWidth={1.5} strokeDasharray="3 2"/>
          </svg>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:"700",color:T.text,letterSpacing:"-.3px"}}>HookePak</div>
          <div style={{fontSize:9,color:T.textLight}}>FEFCO | Pack | Pallet | ROI</div>
        </div>
        <span style={{marginLeft:"auto",background:T.purpleLight,color:T.purple,padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:"600"}}>Live</span>
      </div>

      {/* Main tabs */}
      <div style={{display:"flex",background:T.surface,borderBottom:`1px solid ${T.border}`,overflowX:"auto",flexShrink:0}}>
        {MAIN_TABS.map(([id,lbl])=>(<button key={id} onClick={()=>setTab(id)} style={{flex:"0 0 auto",padding:"9px 14px",background:"none",border:"none",borderBottom:`2px solid ${tab===id?T.purple:"transparent"}`,color:tab===id?T.purple:T.textMid,fontSize:11,fontWeight:tab===id?"700":"400",cursor:"pointer",whiteSpace:"nowrap"}}>{lbl}</button>))}
      </div>
      {productFile&&(
        <div style={{height:32,background:T.purpleLight,borderBottom:`1px solid ${T.purpleMid}`,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:10,color:T.purple,gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
            <span>📦</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{productFile.name}</span>
            <span style={{padding:"2px 6px",border:`1px solid ${T.purpleMid}`,borderRadius:10}}>[{productFile.format}]</span>
          </div>
          <div style={{display:"flex",gap:4}}>
            {[["upright","Upright"],["side","On side"],["rotated","Rotated"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setProductOrientation(id)} style={{border:`1px solid ${productOrientation===id?T.purple:T.purpleMid}`,background:productOrientation===id?T.purple:"transparent",color:productOrientation===id?"white":T.purple,padding:"2px 6px",borderRadius:12,fontSize:9,cursor:"pointer"}}>{lbl}</button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{display:"flex",alignItems:"center",gap:5,color:collisionCount<0?T.textMid:(collisionCount>0?"#DC2626":"#16A34A")}}>
              <span style={{width:7,height:7,borderRadius:999,background:collisionCount<0?"#9CA3AF":(collisionCount>0?"#DC2626":"#16A34A"),display:"inline-block"}}/>
              {collisionCount<0?"Check fit (open box)":collisionCount>0?"Collision detected":"Fits cleanly"}
            </span>
            <button onClick={clearProduct} style={{border:`1px solid ${T.purple}`,background:"white",color:T.purple,padding:"3px 8px",borderRadius:7,fontSize:9,cursor:"pointer"}}>Clear product</button>
          </div>
        </div>
      )}

      {/* Body: left sidebar + main content */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* ── LEFT SIDEBAR: Carton controls ───────────────────────────────── */}
        <div style={{width:200,flexShrink:0,borderRight:`1px solid ${T.border}`,background:T.surface,overflowY:"auto",padding:"12px 10px",display:"grid",gap:10,alignContent:"start"}}>
          <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1}}>Product</div>
          {!productFile&&!productLoading&&(
            <div
              onClick={()=>productInputRef.current?.click()}
              onDragOver={e=>{e.preventDefault();}}
              onDrop={e=>{e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f)handleProductFile(f);}}
              style={{border:`1px dashed ${T.border}`,background:T.bg,borderRadius:10,padding:14,textAlign:"center",cursor:"pointer"}}
            >
              <svg width={26} height={26} viewBox="0 0 26 26" style={{display:"block",margin:"0 auto 6px"}}>
                <rect x={4} y={4} width={18} height={18} rx={3} fill="none" stroke={T.textMid} strokeWidth={1.5}/>
                <path d="M13 18 V8 M9.5 11.5 L13 8 L16.5 11.5" fill="none" stroke={T.purple} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <div style={{fontSize:10,color:T.textMid}}>Import Product CAD</div>
              <div style={{fontSize:8,color:T.textLight,marginTop:3}}>OBJ | STL | GLB</div>
            </div>
          )}
          {productLoading&&(
            <div style={{border:`1px dashed ${T.border}`,background:T.bg,borderRadius:10,padding:14,textAlign:"center"}}>
              <div className="hp-spin" style={{width:18,height:18,border:"2px solid #ddd",borderTop:`2px solid ${T.purple}`,borderRadius:"50%",margin:"0 auto 6px"}}/>
              <div style={{fontSize:10,color:T.textMid}}>Parsing file...</div>
            </div>
          )}
          {productError&&(
            <div style={{border:`1px solid #FCA5A5`,background:"#FEF2F2",borderRadius:10,padding:10}}>
              <div style={{fontSize:10,color:"#B91C1C"}}>{productError}</div>
              <button onClick={()=>productInputRef.current?.click()} style={{marginTop:6,border:"1px solid #EF4444",background:"white",color:"#B91C1C",fontSize:9,padding:"4px 8px",borderRadius:6,cursor:"pointer"}}>Try again</button>
            </div>
          )}
          {productFile&&shownBBox&&(
            <>
              <div style={{border:`1px solid ${T.border}`,background:T.bg,borderRadius:10,padding:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:T.text}}>{truncateName(productFile.name)}</div>
                  <button onClick={clearProduct} style={{border:"none",background:"transparent",fontSize:14,cursor:"pointer",color:T.textLight,lineHeight:1}}>X</button>
                </div>
                <div style={{marginTop:4,fontSize:8,color:T.purple,display:"inline-block",padding:"2px 6px",borderRadius:10,background:T.purpleLight,border:`1px solid ${T.purpleMid}`}}>{productFile.format}</div>
                <div style={{marginTop:6,fontSize:9,fontFamily:"monospace",color:T.text}}>L={shownBBox.L} W={shownBBox.W} H={shownBBox.H} {productUnit}</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                {["mm","cm","inches","m"].map(u=><button key={u} onClick={()=>setProductUnit(u)} style={{flex:1,border:`1px solid ${productUnit===u?T.purple:T.border}`,background:productUnit===u?T.purpleLight:"white",color:productUnit===u?T.purple:T.textMid,fontSize:8,padding:"4px 2px",borderRadius:6,cursor:"pointer"}}>{u}</button>)}
              </div>
              <div style={{border:`1px solid ${T.border}`,background:T.bg,borderRadius:8,padding:8}}>
                <div style={{fontSize:9,color:T.textMid,fontWeight:700,marginBottom:6}}>CLEARANCES (mm)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {["top","bottom","left","right","front","back"].map(k=>(
                    <label key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:8,color:T.textLight,textTransform:"capitalize"}}>
                      {k}
                      <input type="number" value={productClearance[k]} onChange={e=>setProductClearance(v=>({...v,[k]:Math.max(0,Number(e.target.value)||0)}))} style={{width:44,padding:"2px 4px",fontSize:10,border:`1px solid ${T.border}`,borderRadius:5}}/>
                    </label>
                  ))}
                </div>
                <div style={{fontSize:10,color:T.textMid,marginTop:6,fontFamily:"monospace"}}>L={productInnerDims?.L??"-"}  W={productInnerDims?.W??"-"}  H={productInnerDims?.H??"-"} mm</div>
                <div style={{display:"flex",gap:5,marginTop:6}}>
                  <button onClick={applyProductInnerToCarton} style={{flex:1,border:"none",background:T.purple,color:"white",fontSize:8,padding:"5px 6px",borderRadius:6,cursor:"pointer"}}>Apply to carton</button>
                  <button onClick={()=>setProductClearance(aiClearances||{top:10,bottom:10,left:8,right:8,front:8,back:8})} style={{flex:1,border:`1px solid ${T.purple}`,background:"white",color:T.purple,fontSize:8,padding:"5px 6px",borderRadius:6,cursor:"pointer"}}>Reset to AI</button>
                </div>
              </div>
              <div style={{border:`1px solid ${T.border}`,background:T.bg,borderRadius:8,padding:8}}>
                <div style={{fontSize:9,color:T.textMid,fontWeight:700,marginBottom:6}}>ORIENTATION</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                  {[["upright","Upright"],["side","On side"],["rotated","Rotated 90"]].map(([id,lbl])=>(
                    <button key={id} onClick={()=>setProductOrientation(id)} style={{gridColumn:id==="rotated"?"1 / span 2":"auto",border:`1px solid ${productOrientation===id?T.purple:T.border}`,background:productOrientation===id?T.purpleLight:"white",color:productOrientation===id?T.purple:T.textMid,fontSize:8,padding:"5px 4px",borderRadius:6,cursor:"pointer"}}>{lbl}</button>
                  ))}
                </div>
                <div style={{marginTop:6,fontSize:9,fontFamily:"monospace",color:T.text}}>Detected: L={round1(shownBBox.L)} W={round1(shownBBox.W)} H={round1(shownBBox.H)}</div>
                <div style={{fontSize:9,fontFamily:"monospace",color:T.textMid}}>As packed: L={round1(orientedBBox?.L||0)} W={round1(orientedBBox?.W||0)} H={round1(orientedBBox?.H||0)}</div>
                <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,fontSize:8,color:T.textMid}}>
                  <input type="checkbox" checked={autoApplyOrientation} onChange={e=>setAutoApplyOrientation(e.target.checked)}/>
                  Auto-apply dims when orientation changes
                </label>
                {!autoApplyOrientation&&<button onClick={applyProductInnerToCarton} style={{marginTop:6,border:`1px solid ${T.purple}`,background:"white",color:T.purple,fontSize:8,padding:"5px 8px",borderRadius:6,cursor:"pointer"}}>Apply</button>}
              </div>
              {suggestLoading&&<div style={{fontSize:9,color:T.textMid,padding:"6px 2px"}}>Generating AI suggestion...</div>}
              {productSuggestion&&(
                <div style={{background:T.purpleLight,border:`1px solid ${T.purpleMid}`,borderRadius:10,padding:10}}>
                  <div style={{fontSize:9,color:T.purple,fontWeight:700}}>AI Suggestion</div>
                  <div style={{fontSize:9,color:T.text,marginTop:4}}>Detected: {productSuggestion.productGuess} <span style={{fontSize:8,color:T.textLight}}>({productSuggestion.confidence})</span></div>
                  <div style={{fontSize:9,color:T.textMid,marginTop:3}}>FEFCO {productSuggestion.fefcoStyle} - {productSuggestion.fefcoStyleName}</div>
                  <div style={{fontSize:9,color:T.textMid}}>L={productSuggestion.innerL} W={productSuggestion.innerW} H={productSuggestion.innerH}mm</div>
                  <div style={{fontSize:9,color:T.textMid}}>{productSuggestion.boardRecommendation}</div>
                  <div style={{fontSize:8,color:T.textLight,marginTop:4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{productSuggestion.reasoning}</div>
                  <div style={{display:"flex",gap:5,marginTop:8}}>
                    <button onClick={()=>{
                      setL(productSuggestion.innerL);setW(productSuggestion.innerW);setH(productSuggestion.innerH);setStyle(productSuggestion.fefcoStyle);setBoard(mapBoardName(productSuggestion.boardRecommendation));
                      setAppToast(`Applied: ${productSuggestion.productGuess} -> FEFCO ${productSuggestion.fefcoStyle}, ${productSuggestion.innerL}x${productSuggestion.innerW}x${productSuggestion.innerH}mm`);
                    }} style={{flex:1,border:"none",background:T.purple,color:"white",fontSize:8,padding:"5px 6px",borderRadius:6,cursor:"pointer"}}>Apply dims + style</button>
                    <button onClick={()=>{setL(productSuggestion.innerL);setW(productSuggestion.innerW);setH(productSuggestion.innerH);setAppToast("Prefilled dimensions for manual review");}} style={{flex:1,border:`1px solid ${T.purple}`,background:"white",color:T.purple,fontSize:8,padding:"5px 6px",borderRadius:6,cursor:"pointer"}}>Edit first</button>
                  </div>
                </div>
              )}
            </>
          )}
          <input ref={productInputRef} type="file" accept=".obj,.stl,.glb,.gltf" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)handleProductFile(f);e.target.value="";}}/>

          <div style={{height:1,background:T.border,margin:"4px 0"}}/>
          <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1}}>Carton Dimensions</div>
          <Slider label="L  Length" value={L} min={80} max={800} color={T.purple} onChange={v=>{setL(v);setSel(null);}} glow={selCtrl==="L"}/>
          <Slider label="W  Width"  value={W} min={50} max={600} color={T.green}  onChange={v=>{setW(Math.min(v,L));setSel(null);}} glow={selCtrl==="W"}/>
          <Slider label="H  Height" value={H} min={30} max={600} color={T.blue}   onChange={v=>{setH(v);setSel(null);}} glow={selCtrl==="H"}/>

          <div style={{height:1,background:T.border,margin:"4px 0"}}/>
          <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1}}>Board Type</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {BOARDS.map(b=>(<button key={b} onClick={()=>setBoard(b)} style={{textAlign:"left",background:board===b?T.purpleLight:"none",border:`1px solid ${board===b?T.purple:T.border}`,color:board===b?T.purple:T.textMid,padding:"5px 8px",fontSize:10,borderRadius:7,cursor:"pointer",fontWeight:board===b?"600":"400"}}>{b}</button>))}
          </div>

          <div style={{height:1,background:T.border,margin:"4px 0"}}/>
          <div style={{fontSize:8,color:T.textLight,textTransform:"uppercase",letterSpacing:1}}>Dimensions</div>
          <div style={{background:T.bg,borderRadius:8,padding:"8px 10px",fontFamily:"monospace",fontSize:10,color:T.text,border:`1px solid ${T.border}`}}>
            <div><span style={{color:T.purple}}>L</span> {L} mm</div>
            <div><span style={{color:T.green}}>W</span> {W} mm</div>
            <div><span style={{color:T.blue}}>H</span> {H} mm</div>
            <div style={{marginTop:4,color:T.textMid,fontSize:9}}>Vol: {round1(L*W*H/1e6)} L</div>
          </div>
        </div>

        {/* ── MAIN CONTENT ─────────────────────────────────────────────────── */}
        <div style={{flex:1,overflowY:"auto"}}>
          {tab==="design"&&<DesignTab L={L} W={W} H={H} lidH={lidH} style={style} setStyle={setStyle} board={board} sel={sel} setSel={setSel} setBoard={setBoard} setLidH={setLidH} setL={setL} setW={setW} setH={setH} prompt={prompt} setPrompt={setPrompt} loading={loading} setLoading={setLoading} boardThicknessMm={boardThicknessMm} productGeometry={productGeometry} productBBox={orientedBBox} productClearance={productClearance} productOrientation={productOrientation} collisionCount={collisionCount} onCollisionUpdate={setCollisionCount}/>}
          {tab==="pack"&&<PackTab box={box} fillPatterns={[]} bestFill={null}/>}
          {tab==="pallet"&&<PalletTab box={box} style={style} board={board}/>}
          {tab==="roi"&&<ROITab L={L} W={W} H={H} style={style} board={board} saved={saved} setSaved={setSaved} onExport={handleExport}/>}
          {tab==="scenarios"&&<ScenariosTab saved={saved} setSaved={setSaved} onExport={handleExport}/>}
        </div>
      </div>

      <style>{`
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:${T.purple};cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(124,58,237,.3);}
        input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:${T.purple};cursor:pointer;border:2px solid white;}
        .hp-spin{animation:hp-spin 1s linear infinite}
        @keyframes hp-spin{to{transform:rotate(360deg)}}
        *{box-sizing:border-box}
      `}</style>
      {appToast&&<div style={{position:"fixed",right:14,bottom:14,background:T.purple,color:"white",padding:"9px 12px",borderRadius:8,fontSize:10,zIndex:9999}}>{appToast}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<HookePakApp />);</script></body></html>
